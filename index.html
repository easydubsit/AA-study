<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OTS Academic Assessment Practice</title>
<style>
:root{--bg:#eef2f7;--panel:#fff;--ink:#172033;--muted:#667085;--line:#d7deea;--accent:#2457a7;--accent2:#173b73;--good:#137333;--goodbg:#e6f4ea;--bad:#b3261e;--badbg:#fce8e6;--warn:#8a5a00;--shadow:0 10px 30px rgba(20,35,60,.10)}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
header{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;padding:24px 18px;box-shadow:var(--shadow)}
.header-inner,.app{max-width:980px;margin:auto}.eyebrow{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;opacity:.8;font-weight:700}h1{margin:4px 0 6px;font-size:clamp(1.55rem,4vw,2.35rem)}header p{margin:0;opacity:.9}
.app{padding:20px 14px 50px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.full{grid-column:1/-1}label.heading{display:block;font-weight:750;margin-bottom:7px}.lesson-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 14px;max-height:280px;overflow:auto;padding:10px;border:1px solid var(--line);border-radius:12px}.lesson-item{display:flex;gap:8px;align-items:flex-start}.lesson-item input{margin-top:4px}
select,input[type=number]{width:100%;padding:11px;border:1px solid #b9c4d6;border-radius:10px;background:#fff;font:inherit}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{font:inherit;font-weight:700;border:0;border-radius:10px;padding:11px 16px;cursor:pointer}.primary{background:var(--accent);color:white}.secondary{background:#e8eef8;color:var(--accent2)}.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}button:disabled{opacity:.5;cursor:not-allowed}
.hidden{display:none!important}.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}.progress-track{height:10px;background:#e4e9f1;border-radius:999px;overflow:hidden;margin:10px 0 20px}.progress-fill{height:100%;width:0;background:var(--accent);transition:width .25s}.badge{display:inline-block;background:#e8eef8;color:var(--accent2);font-size:.78rem;font-weight:800;padding:5px 9px;border-radius:999px}.question{font-size:1.08rem;white-space:pre-line;margin:14px 0 18px}.options{display:grid;gap:10px}.option{width:100%;text-align:left;background:#fff;border:2px solid var(--line);padding:13px 14px;border-radius:12px;font-weight:600;color:var(--ink)}.option:hover:not(:disabled){border-color:#88a5d2;background:#f7faff}.option.correct{border-color:var(--good);background:var(--goodbg);color:var(--good)}.option.incorrect{border-color:var(--bad);background:var(--badbg);color:var(--bad)}.option .letter{font-weight:900;margin-right:8px}.feedback{margin-top:15px;padding:13px;border-radius:11px}.feedback.good{background:var(--goodbg);color:var(--good)}.feedback.bad{background:var(--badbg);color:var(--bad)}.feedback-title{font-weight:850;margin-bottom:6px}.feedback-explanation{font-weight:550;color:var(--ink);line-height:1.55}.feedback-explanation b{font-weight:800}.review-explanation{margin-top:9px;padding:10px 12px;background:#f7f9fc;border-radius:9px;line-height:1.5}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0}.stat{background:#f7f9fc;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}.stat strong{display:block;font-size:1.35rem}.muted{color:var(--muted)}.result-title{text-align:center;font-size:1.8rem;margin:0}.score-ring{width:135px;height:135px;margin:18px auto;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--accent) var(--pct),#e3e8f0 0)}.score-ring:after{content:"";width:102px;height:102px;border-radius:50%;background:#fff;position:absolute}.score-text{position:relative;z-index:1;text-align:center;font-weight:850;font-size:1.4rem}.review-list{display:grid;gap:12px;margin-top:16px}.review-card{border:1px solid var(--line);border-left:5px solid var(--bad);border-radius:10px;padding:14px}.review-card p{white-space:pre-line}.small{font-size:.88rem}.footer-note{text-align:center;color:var(--muted);font-size:.85rem;margin-top:22px}
@media(max-width:700px){.grid,.lesson-list{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.panel{padding:16px}.topbar{align-items:flex-start;flex-direction:column}}
@media print{header,.setup-actions,.quiz-nav,.footer-note{display:none}.panel{box-shadow:none}}
</style>
</head>
<body>
<header><div class="header-inner"><div class="eyebrow">Officer Training School</div><h1>Academic Assessment Practice</h1><p>Interactive study and exam practice</p></div></header>
<main class="app">
<section id="setup" class="panel">
<h2>Build Your Quiz</h2>
<div class="grid">
<div class="full"><label class="heading">Lessons</label><div id="lessonList" class="lesson-list"></div><div class="actions"><button class="ghost" id="allBtn">Select all</button><button class="ghost" id="noneBtn">Clear all</button></div></div>
<div><label class="heading" for="mode">Mode</label><select id="mode"><option value="study">Study — immediate feedback</option><option value="exam">Exam — results at the end</option></select></div>
<div><label class="heading" for="count">Number of questions</label><select id="count"><option value="10">10</option><option value="20">20</option><option value="30">30</option><option value="50">50</option><option value="all">All selected questions</option></select></div>
<div><label class="heading" for="order">Question order</label><select id="order"><option value="shuffle">Shuffle questions</option><option value="original">Original order</option></select></div>
<div><label class="heading" for="answerOrder">Answer order</label><select id="answerOrder"><option value="original">Keep A–D order</option><option value="shuffle">Shuffle answer choices</option></select></div>
</div>
<div class="actions setup-actions"><button class="primary" id="startBtn">Start Quiz</button><button class="secondary" id="missedBtn">Practice Saved Missed Questions</button><button class="ghost" id="clearMissedBtn">Clear Saved Missed</button></div>
<p id="setupMsg" class="muted small"></p>
</section>

<section id="quiz" class="panel hidden">
<div class="topbar"><div><span id="sectionBadge" class="badge"></span><div id="qCounter" class="muted small"></div></div><div id="liveScore" class="small"></div></div>
<div class="progress-track"><div id="progress" class="progress-fill"></div></div>
<div id="questionText" class="question"></div><div id="options" class="options"></div><div id="feedback" class="feedback hidden"></div>
<div class="actions quiz-nav"><button id="nextBtn" class="primary" disabled>Next</button><button id="quitBtn" class="ghost">End Quiz</button></div>
</section>

<section id="results" class="panel hidden">
<h2 class="result-title">Quiz Complete</h2><div id="scoreRing" class="score-ring"><div id="scoreText" class="score-text"></div></div>
<div class="stats"><div class="stat"><strong id="correctStat">0</strong>Correct</div><div class="stat"><strong id="wrongStat">0</strong>Incorrect</div><div class="stat"><strong id="totalStat">0</strong>Questions</div><div class="stat"><strong id="percentStat">0%</strong>Score</div></div>
<div class="actions"><button class="primary" id="retryMissedBtn">Retry Missed</button><button class="secondary" id="newQuizBtn">New Quiz</button><button class="ghost" id="printBtn">Print Results</button></div>
<div id="reviewWrap"><h3>Review Missed Questions</h3><div id="reviewList" class="review-list"></div></div>
</section>
<div class="footer-note">Your progress and missed-question list are stored only in this browser.</div>
</main>
<script>
const DATA=[{"title":"US Constitution","questions":[{"id":"s1q1","number":1,"prompt":"A newly commissioned second lieutenant arrives at his first duty station and attends a briefing on military authority. During the discussion, another lieutenant states, \"Since the President is Commander in Chief, all military authority comes exclusively from the Executive Branch.\" A senior captain explains that while the President commands the military, officers remain obligated to obey laws passed by Congress and decisions issued by the Supreme Court.\n\nAccording to the lesson, which branch establishes military authority?","options":{"A":"Legislative Branch","B":"Executive Branch","C":"Judicial Branch","D":"All three branches equally"},"answer":"B","section":"US Constitution"},{"id":"s1q2","number":2,"prompt":"A squadron commander reminds newly assigned officers that although they receive their commissions from the President, their authority is not unlimited. During the discussion, the commander emphasizes that lawful military authority exists within a constitutional system that distributes power to prevent any single branch from becoming dominant.\n\nWhich constitutional principle is the commander describing?","options":{"A":"Federalism","B":"Enumerated Powers","C":"Separation of Powers and Checks and Balances","D":"Ratification"},"answer":"C","section":"US Constitution"},{"id":"s1q3","number":3,"prompt":"A logistics readiness officer proposes a new policy affecting vehicle operations. During coordination, a legal advisor reminds the officer that the federal government possesses only those powers specifically granted by the Constitution and cannot simply assume authority over every matter.\n\nWhich governing principle is MOST directly illustrated?","options":{"A":"Federalism","B":"Enumerated Powers","C":"Separation of Powers","D":"Judicial Review"},"answer":"B","section":"US Constitution"},{"id":"s1q4","number":4,"prompt":"A Civil Engineer Squadron coordinates with local county officials during disaster response planning. The installation commander explains that many responsibilities remain with state and local governments while the federal government performs only those functions authorized by the Constitution.\n\nWhich constitutional principle BEST explains this relationship?","options":{"A":"Enumerated Powers","B":"Separation of Powers","C":"Federalism","D":"Checks and Balances"},"answer":"C","section":"US Constitution"},{"id":"s1q5","number":5,"prompt":"A first lieutenant interviews applicants for a volunteer committee supporting an installation event. One applicant is highly qualified but practices a different religion than most members of the organization. Another officer privately recommends selecting someone \"who better fits the unit.\"\n\nAccording to the lesson, which constitutional amendment most directly limits the lieutenant's authority in making this decision?","options":{"A":"First Amendment","B":"Second Amendment","C":"Fourth Amendment","D":"Tenth Amendment"},"answer":"A","section":"US Constitution"},{"id":"s1q6","number":6,"prompt":"While conducting base security operations, military police receive an anonymous phone call claiming stolen government property is located inside a civilian residence just outside the installation. The patrol leader immediately orders Airmen to enter the home without obtaining a warrant or establishing probable cause because \"the mission cannot wait.\"\n\nAccording to the lesson, which constitutional amendment most directly applies?","options":{"A":"First Amendment","B":"Second Amendment","C":"Third Amendment","D":"Fourth Amendment"},"answer":"D","section":"US Constitution"},{"id":"s1q7","number":7,"prompt":"Following a natural disaster, a commander considers temporarily housing several Airmen inside privately owned homes located near the installation because local lodging is unavailable. The homeowners object to the plan.\n\nAccording to the lesson, which constitutional amendment most directly limits the commander's authority?","options":{"A":"Second Amendment","B":"Third Amendment","C":"Fourth Amendment","D":"Fifth Amendment"},"answer":"B","section":"US Constitution"},{"id":"s1q8","number":8,"prompt":"During an installation open house, a frustrated officer tells members of the public that privately owned firearms must be surrendered before entering the installation because \"the military can confiscate any weapon whenever necessary.\"\n\nAccording to the lesson, which constitutional amendment is MOST directly related to this situation?","options":{"A":"First Amendment","B":"Second Amendment","C":"Fourth Amendment","D":"Tenth Amendment"},"answer":"B","section":"US Constitution"},{"id":"s1q9","number":9,"prompt":"An Airman is accused of misconduct. Before any hearing occurs, a newly assigned officer recommends immediately imposing punishment because \"the evidence appears overwhelming.\"\n\nAccording to the lesson, which constitutional principle most directly limits the officer's authority?","options":{"A":"The Sixth, Seventh, and Eighth Amendments require legal process before punishment.","B":"The Third Amendment prevents punishment without housing.","C":"The Tenth Amendment reserves punishment to the states.","D":"The Second Amendment protects military members from discipline."},"answer":"A","section":"US Constitution"},{"id":"s1q10","number":10,"prompt":"A commander explains that although the Constitution grants significant authority to the federal government, powers not specifically delegated to the national government remain reserved to the states or the people.\n\nWhich amendment is the commander describing?","options":{"A":"Ninth Amendment","B":"Tenth Amendment","C":"Fifth Amendment","D":"Fourth Amendment"},"answer":"B","section":"US Constitution"},{"id":"s1q11","number":11,"prompt":"Capt Morris has already received a commission from the President and assumed command of a logistics flight. During a deployment planning meeting, Congress passes a new law governing military funding, and shortly afterward the Supreme Court issues a decision interpreting that law. Capt Morris privately states that because the President commissioned every officer, only guidance issued through the Executive Branch matters to military officers.\n\nWhich statement is MOST consistent with the lesson?","options":{"A":"Military officers are obligated only to the Executive Branch.","B":"Military officers receive authority from the Executive Branch but remain obligated to obey laws passed by Congress and rulings issued by the Supreme Court.","C":"Congress may not influence military operations.","D":"The Judicial Branch has no role in military authority."},"answer":"B","section":"US Constitution"},{"id":"s1q12","number":12,"prompt":"A squadron commander is developing an Equal Opportunity training session. Before the presentation begins, the commander reviews several hypothetical situations involving promotion boards, religious accommodations, political discussions, and assignment decisions. The commander reminds supervisors that they must not allow certain personal characteristics to influence official decisions, even when those characteristics have no effect on mission performance.\n\nAccording to the lesson, which amendment most directly provides the constitutional limitation discussed?","options":{"A":"First Amendment","B":"Second Amendment","C":"Fourth Amendment","D":"Tenth Amendment"},"answer":"A","section":"US Constitution"},{"id":"s1q13","number":13,"prompt":"A base commander has already coordinated with local law enforcement regarding an investigation involving a civilian neighborhood adjacent to the installation. Security Forces members possess only an anonymous tip and have not yet established probable cause. A young lieutenant recommends immediately searching several homes because the investigation involves military equipment.\n\nAccording to the lesson, what should occur next?","options":{"A":"Search the homes immediately because military property is involved.","B":"Establish probable cause or obtain appropriate legal authority before conducting the search.","C":"Request homeowners voluntarily house Security Forces members during the investigation.","D":"Confiscate privately owned firearms while the investigation continues."},"answer":"B","section":"US Constitution"},{"id":"s1q14","number":14,"prompt":"During a seminar, several newly commissioned officers discuss the Constitution. One officer states that federalism exists primarily to divide power among Congress, the President, and the Supreme Court. Another argues that enumerated powers simply describe the relationship between state governments and counties. A third explains that the Constitution limits federal authority by granting only specific powers while also dividing responsibilities between federal and state governments.\n\nWhich officer's explanation BEST reflects the governing principles discussed in the lesson?","options":{"A":"The first officer.","B":"The second officer.","C":"The third officer.","D":"None of the officers."},"answer":"C","section":"US Constitution"},{"id":"s1q15","number":15,"prompt":"Following several months of civil unrest, a governor requests assistance from nearby military installations. During planning meetings, local officials discuss responsibilities belonging to county governments, state agencies, and federal authorities. Simultaneously, military leaders coordinate with the President, comply with congressional authorities governing military operations, and ensure planned actions remain consistent with constitutional protections afforded to the public.\n\nWhich conclusion BEST reflects the lesson?","options":{"A":"Military officers operate under Executive authority alone.","B":"Constitutional authority requires officers to understand governing principles and constitutional limits while exercising military authority.","C":"Federalism eliminates the need for congressional oversight of military operations.","D":"Constitutional amendments primarily apply only to civilians."},"answer":"B","section":"US Constitution"}]},{"title":"Professional and Unprofessional Relationships","questions":[{"id":"s2q1","number":1,"prompt":"A flight commander encourages Airmen to participate in squadron sports, volunteer events, and mentoring programs to strengthen morale and esprit de corps.\n\nAccording to the lesson, these activities are examples of:","options":{"A":"Fraternization","B":"Professional relationships","C":"Improper favoritism","D":"Unprofessional relationships"},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q2","number":2,"prompt":"Which of the following BEST describes an unprofessional relationship?","options":{"A":"Any relationship between members of different ranks.","B":"A relationship that compromises or appears to compromise authority, favoritism, or mission accomplishment.","C":"Any off-duty friendship.","D":"Any relationship involving social media."},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q3","number":3,"prompt":"Which of the following is NOT one of the indicators of an unprofessional relationship?","options":{"A":"Creates the appearance of favoritism.","B":"Compromises supervisory authority.","C":"Improves morale and mission accomplishment.","D":"Involves misuse of position for personal gain."},"answer":"C","section":"Professional and Unprofessional Relationships"},{"id":"s2q4","number":4,"prompt":"According to the lesson, unprofessional relationships may exist between:","options":{"A":"Officers only.","B":"Officers and enlisted members only.","C":"Military members and civilian employees only.","D":"Officers, enlisted members, civilians, and contractor personnel."},"answer":"D","section":"Professional and Unprofessional Relationships"},{"id":"s2q5","number":5,"prompt":"An Air Force officer begins routinely borrowing money from an enlisted member to cover personal expenses.\n\nWhich statement is MOST accurate?","options":{"A":"Acceptable if both members agree.","B":"Acceptable if they are outside the chain of command.","C":"Specifically prohibited for officers.","D":"Only prohibited during duty hours."},"answer":"C","section":"Professional and Unprofessional Relationships"},{"id":"s2q6","number":6,"prompt":"Which officer activity is specifically prohibited?","options":{"A":"Attending an official squadron holiday party.","B":"Sharing transportation during a TDY.","C":"Gambling with enlisted members.","D":"Participating in unit volunteer events."},"answer":"C","section":"Professional and Unprofessional Relationships"},{"id":"s2q7","number":7,"prompt":"Fraternization is BEST defined as:","options":{"A":"Any friendship between officers.","B":"A criminal form of unprofessional relationship between an officer and enlisted member that prejudices good order and discipline or discredits the armed forces.","C":"Dating within the same squadron.","D":"Any off-duty social activity involving enlisted members."},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q8","number":8,"prompt":"Which UCMJ article specifically criminalizes fraternization?","options":{"A":"Article 92","B":"Article 133","C":"Article 134","D":"Article 15"},"answer":"C","section":"Professional and Unprofessional Relationships"},{"id":"s2q9","number":9,"prompt":"Who is primarily responsible for maintaining professionalism in an unprofessional relationship?","options":{"A":"The junior member.","B":"Both members equally.","C":"The senior member.","D":"The commander."},"answer":"C","section":"Professional and Unprofessional Relationships"},{"id":"s2q10","number":10,"prompt":"Which factor should commanders consider when evaluating whether a relationship has become unprofessional?","options":{"A":"Whether members work similar schedules.","B":"Whether it has compromised the chain of command or created the appearance of partiality.","C":"Whether both members consented.","D":"Whether the relationship began off duty."},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q11","number":11,"prompt":"Capt Lewis supervises a civilian contractor responsible for maintaining communications equipment. Over several months, Capt Lewis begins inviting the contractor on weekend trips, repeatedly accepts expensive gifts, and eventually gives the contractor preferred work assignments over equally qualified personnel. Several Airmen begin questioning whether assignments are based on merit.\n\nAccording to the lesson, why is this relationship problematic?","options":{"A":"Officers may never socialize with contractors.","B":"It creates the appearance of favoritism and compromises confidence in leadership.","C":"Contractors are prohibited from interacting with military members off duty.","D":"Only financial relationships are prohibited."},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q12","number":12,"prompt":"A first lieutenant routinely plays golf with several enlisted members from another squadron once every few months during a base tournament. The activity is open to everyone on base, and no participant supervises another. No favoritism or misuse of authority is evident.\n\nBased on the lesson, this relationship is:","options":{"A":"Automatically fraternization.","B":"Automatically prohibited because officers and enlisted members are present.","C":"Potentially acceptable because occasional activities alone do not necessarily create an unprofessional relationship.","D":"Prohibited because officers may never participate in recreational activities with enlisted members."},"answer":"C","section":"Professional and Unprofessional Relationships"},{"id":"s2q13","number":13,"prompt":"A technical training instructor completes training with a student who graduates and reports to her first duty station. Three months later, the instructor contacts the former student and invites them to spend the weekend together, including sharing hotel accommodations during a sporting event.\n\nAccording to the lesson, which statement is MOST accurate?","options":{"A":"The relationship is permissible because training has ended.","B":"The prohibitions remain in effect because six months have not yet passed after initial skills training.","C":"It is acceptable if they are stationed at different bases.","D":"The prohibition applies only while both are in the same unit."},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q14","number":14,"prompt":"A major learns that a captain has been dating an enlisted Airman assigned to another installation. Neither member is in the same chain of command, and they insist their relationship has not affected work performance. Several members of the unit, however, begin questioning the captain's judgment and whether standards are applied equally.\n\nWhich statement BEST reflects the lesson?","options":{"A":"The relationship cannot be fraternization because they work in different units.","B":"Fraternization may exist even across units or services if it undermines good order, discipline, or respect for authority.","C":"Dating is acceptable as long as there is no direct supervision.","D":"Marriage would automatically eliminate any concern."},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q15","number":15,"prompt":"A commander receives credible information that a lieutenant has developed an unprofessional relationship with an enlisted member. The commander counsels both individuals and issues a lawful order directing them to cease the relationship. The lieutenant ignores the order and continues the relationship.\n\nWhich course of action is MOST consistent with the lesson?","options":{"A":"No further action because counseling was completed.","B":"The lieutenant may be subject to disciplinary action for failure to obey a lawful order in addition to any fraternization concerns.","C":"Only the enlisted member may be disciplined.","D":"The commander must immediately initiate a court-martial."},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q16","number":16,"prompt":"A commander authorizes a unit holiday party where every member of the squadron, regardless of rank, is invited. During the event, officers and enlisted members socialize together, participate in games, and eat dinner. Several weeks later, one officer begins privately meeting with a single enlisted member every weekend, frequently lending money and discussing promotion recommendations.\n\nWhich statement BEST distinguishes the two situations?","options":{"A":"Both situations are prohibited because officers and enlisted members socialized together.","B":"The holiday party is an example of a command-authorized professional event, while the recurring personal relationship creates the appearance of favoritism and violates officer-specific prohibitions.","C":"Both situations are acceptable because they occurred off duty.","D":"The recurring meetings are acceptable because no direct chain of command exists."},"answer":"B","section":"Professional and Unprofessional Relationships"},{"id":"s2q17","number":17,"prompt":"A newly commissioned lieutenant wants to build rapport with enlisted Airmen. Over several months, the lieutenant begins riding to work daily with one Airman, vacations with the Airman and spouse, shares hotel rooms during leave, and regularly socializes only with that individual. Other Airmen begin questioning whether the lieutenant can fairly supervise enlisted personnel in the future.\n\nAccording to the lesson, what is the BEST leadership decision?","options":{"A":"Continue the relationship because there is no current supervisory relationship.","B":"End the recurring personal activities because even the appearance of undue familiarity can undermine morale, authority, and unit cohesion.","C":"Continue the relationship until someone files a complaint.","D":"Marry the enlisted member to eliminate fraternization concerns."},"answer":"B","section":"Professional and Unprofessional Relationships"}]},{"title":"USAF & USSF Core Values","questions":[{"id":"s3q1","number":1,"prompt":"Capt Hernandez recently assumed command of a Force Support Flight that had earned a reputation for completing projects quickly. During preparation for an upcoming MAJCOM inspection, a senior NCO privately informs the captain that one section has been signing off required equipment inspections before every item has actually been verified. The NCO explains that the practice has existed for years, no safety incidents have occurred, and correcting the records now will likely delay the inspection and reflect poorly on the unit. Several supervisors recommend quietly fixing the remaining discrepancies without informing higher headquarters. After reviewing the documentation, Capt Hernandez immediately reports the issue through the appropriate channels, accepts responsibility for correcting the deficiencies, and explains to the unit why accurate reporting is essential.\n\nWhich Core Value is MOST directly demonstrated by Capt Hernandez?","options":{"A":"Service Before Self","B":"Integrity First","C":"Excellence In All We Do","D":"Respect"},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q2","number":2,"prompt":"A Civil Engineer Squadron recently completed a demanding six-month construction project supporting a new training facility. During the final after-action review, the commander publicly recognizes the entire team instead of highlighting only the project managers. When asked why, the commander explains that every member—from equipment operators to administrative personnel—contributed to the mission's success and that long-term organizational success depends on every Airman understanding their value to the team. Several Airmen later comment that individual accomplishments received less attention than they expected.\n\nWhich virtue is MOST directly demonstrated by the commander's actions?","options":{"A":"Accountability","B":"Teamwork","C":"Loyalty","D":"Discipline"},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q3","number":3,"prompt":"During a wing exercise, Lt Col Morris notices that a junior lieutenant respectfully challenges a long-standing planning assumption after identifying conflicting guidance in recently published instructions. Although the lieutenant's recommendation requires additional work and initially delays the planning meeting, the revised plan ultimately prevents a significant operational error. Following the exercise, the commander commends the lieutenant for speaking up despite the potential personal risk of questioning established procedures.\n\nWhich virtue is MOST directly demonstrated by the lieutenant?","options":{"A":"Courage","B":"Discipline","C":"Respect","D":"Mission"},"answer":"A","section":"USAF & USSF Core Values"},{"id":"s3q4","number":4,"prompt":"A Medical Group commander routinely reminds supervisors that excellence should never be confused with perfection. During quarterly feedback sessions, the commander emphasizes continuous learning, encourages professional development, supports additional education opportunities, and recognizes personnel who identify ways to improve patient care even when their ideas require revisions before implementation. Some supervisors privately question why unsuccessful ideas receive recognition.\n\nAccording to the lesson, which Core Value is MOST directly being reinforced?","options":{"A":"Integrity First","B":"Service Before Self","C":"Excellence In All We Do","D":"Accountability"},"answer":"C","section":"USAF & USSF Core Values"},{"id":"s3q5","number":5,"prompt":"A newly assigned first lieutenant develops a reputation for admitting mistakes during staff meetings, openly accepting responsibility for missed suspense dates, and ensuring lessons learned are shared with the entire section so similar mistakes are not repeated. Several peers privately suggest that acknowledging mistakes publicly could negatively affect future performance reports. The lieutenant replies that preserving trust within the organization is more important than protecting personal reputation.\n\nWhich virtue is MOST directly demonstrated?","options":{"A":"Humility","B":"Accountability","C":"Honesty","D":"Loyalty"},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q6","number":6,"prompt":"During a deployment, a communications flight experiences extended workdays after several unexpected equipment failures. Near the end of one shift, a staff sergeant finishes assigned duties but notices another work center struggling to restore critical communications before the next flying window. Although no additional help is required by policy and the staff sergeant has already worked twelve hours, the member voluntarily remains to assist until the mission is complete. The following morning, the staff sergeant declines individual recognition and instead asks that the entire maintenance team receive credit for restoring communications.\n\nWhich combination BEST reflects the member's actions?","options":{"A":"Service Before Self through Duty.","B":"Excellence In All We Do through Teamwork.","C":"Integrity First through Accountability.","D":"Service Before Self through Respect."},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q7","number":7,"prompt":"A squadron commander is briefing newly assigned officers about the importance of the Air Force Core Values. During the discussion, one lieutenant asks why the organization spends so much time discussing values instead of focusing exclusively on technical competence. The commander responds that technical expertise alone does not ensure ethical decisions, public confidence, or professional conduct during difficult situations. Several experienced NCOs nod in agreement and explain that the Core Values influence decisions long before written regulations apply.\n\nAccording to the lesson, why are the Core Values MOST important?","options":{"A":"They establish common professional expectations and guide honorable service.","B":"They primarily determine promotion eligibility.","C":"They replace the need for leadership supervision.","D":"They apply only while performing official duties."},"answer":"A","section":"USAF & USSF Core Values"},{"id":"s3q8","number":8,"prompt":"A logistics readiness squadron has consistently met every production metric for the past year. However, during a command climate assessment, several Airmen report that supervisors frequently ignore minor technical order violations as long as deadlines are met. New personnel quickly begin adopting the same habits because they believe mission success is measured only by production numbers. Although inspection results remain acceptable, the wing commander expresses concern about the long-term culture developing within the organization.\n\nWhich statement BEST reflects the lesson?","options":{"A":"Mission accomplishment justifies overlooking minor violations.","B":"Core Values are important because they establish habits of honorable conduct that shape organizational culture.","C":"Production metrics are more important than organizational values.","D":"Integrity applies only when misconduct becomes illegal."},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q9","number":9,"prompt":"Maj Collins recently assumed command of a Medical Support Squadron whose mission performance has remained consistently high for several years. During a routine inspection, the commander discovers that one section has developed a habit of completing required quality assurance checklists before every verification step has actually been performed. When questioned, several experienced Airmen explain that the process has \"always been done this way\" and that no patient has ever been harmed. After reviewing the records, the commander immediately directs the section to stop the practice, explains the ethical implications of inaccurate documentation, and requires all supervisors to discuss the Core Values during the next shift change. The commander has not yet initiated any disciplinary action.\n\nWhich Core Value is the commander MOST directly attempting to reinforce?","options":{"A":"Excellence In All We Do because the commander is improving organizational performance.","B":"Integrity First because the commander is emphasizing honesty and ethical conduct before addressing disciplinary action.","C":"Service Before Self because the commander is requiring additional work from supervisors.","D":"Excellence In All We Do because the commander wants to improve inspection scores."},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q10","number":10,"prompt":"During a squadron leadership development seminar, a captain asks each participant to describe the Core Value they believe most influences everyday decision making. One lieutenant responds that Service Before Self requires Airmen to ignore personal well-being in order to accomplish every mission. Another officer respectfully disagrees, explaining that effective service requires balancing professional responsibilities while maintaining personal readiness to continue serving over time.\n\nBased on the lesson, which statement BEST reflects the Air Force's understanding of Service Before Self?","options":{"A":"Airmen should always sacrifice their personal health to accomplish every task.","B":"Airmen should place professional duties above personal desires while maintaining the readiness necessary to continue serving effectively.","C":"Service Before Self means following every order regardless of ethical concerns.","D":"Service Before Self applies only during combat operations."},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q11","number":11,"prompt":"Capt Walker recently inherited a Maintenance Flight recognized for exceptional production statistics. During a Commander's Call, the captain explains that future recognition programs will emphasize more than production numbers. Over the next several months, supervisors begin recognizing Airmen who identify process improvements, pursue professional education, mentor junior personnel, and continuously seek opportunities to improve mission effectiveness. Although production rates remain unchanged, supervisors report increased initiative throughout the organization.\n\nWhich Core Value is MOST directly being reinforced?","options":{"A":"Integrity First because Airmen are accepting greater accountability.","B":"Excellence In All We Do because the commander is encouraging continuous improvement beyond minimum standards.","C":"Service Before Self because Airmen are volunteering additional time.","D":"Integrity First because professional education demonstrates honesty."},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q12","number":12,"prompt":"A newly commissioned second lieutenant is preparing to brief officer trainees on the relationship between virtues and Core Values. Before the presentation, the lieutenant reviews several examples collected during the previous month. One example describes an Airman who immediately admitted damaging government equipment even though no witnesses were present. Another describes a supervisor who remained after duty hours to help another section complete an unexpected task. A third describes a team that voluntarily pursued additional training after successfully completing every inspection requirement.\n\nWhich example BEST illustrates how virtues relate to the Core Values?","options":{"A":"Virtues provide practical behaviors that demonstrate each Core Value through everyday decisions and actions.","B":"Virtues replace the need for Core Values by providing more detailed guidance.","C":"Virtues apply primarily to supervisors rather than junior Airmen.","D":"Virtues exist only during official duty hours."},"answer":"A","section":"USAF & USSF Core Values"},{"id":"s3q13","number":13,"prompt":"During an after-action review following a humanitarian relief mission, a wing commander thanks every participating organization for their efforts. Several Airmen comment that although the operation was physically demanding and required extended work hours, the experience strengthened trust between units and demonstrated why the Air Force places such emphasis on the Core Values. One Airman remarks that technical expertise alone would not have produced the same level of cooperation or public confidence.\n\nAccording to the lesson, which conclusion is MOST supported?","options":{"A":"Core Values primarily exist to improve organizational efficiency.","B":"Core Values are important because they establish a common ethical foundation that guides professional conduct and strengthens public trust.","C":"Core Values apply only when Airmen interact with civilians.","D":"Technical competence is generally more important than Core Values during humanitarian operations."},"answer":"B","section":"USAF & USSF Core Values"},{"id":"s3q14","number":14,"prompt":"Lt Col Ramirez recently completed a commander-directed climate assessment after noticing declining morale within the squadron. Although mission performance remained above average, several Airmen expressed concern that recognition programs focused almost exclusively on individual accomplishments while overlooking collaborative efforts and professional development. During the next quarter, the commander introduced team recognition programs, encouraged cross-functional mentoring, and highlighted examples of Airmen helping one another accomplish difficult missions. Productivity remained steady while cooperation noticeably improved.\n\nWhich virtue is MOST directly reinforced by the commander's actions?","options":{"A":"Teamwork","B":"Humility","C":"Accountability","D":"Courage"},"answer":"A","section":"USAF & USSF Core Values"},{"id":"s3q15","number":15,"prompt":"A newly assigned Operations Group commander spends the first month meeting with Airmen from every squadron before publishing command priorities. During one discussion, a senior master sergeant explains that the organization has historically emphasized mission accomplishment above every other consideration. The commander agrees that mission success remains essential but reminds supervisors that long-term mission success depends upon maintaining public trust, professional conduct, and ethical decision making even when those choices require additional effort or temporarily reduce efficiency. Several months later, the commander observes that supervisors routinely reference the Core Values while making difficult leadership decisions.\n\nWhich statement BEST reflects the lesson?","options":{"A":"The Core Values are important because they provide a common ethical framework that guides decisions, strengthens trust, and supports long-term mission success.","B":"Mission accomplishment should always outweigh the Core Values whenever operational efficiency is affected.","C":"The Core Values primarily exist to improve inspection results and organizational performance metrics.","D":"The Core Values are most useful only when specific regulations do not exist."},"answer":"A","section":"USAF & USSF Core Values"}]},{"title":"Problem Solving","questions":[{"id":"s4q1","number":1,"prompt":"A Force Support Squadron notices customer complaints have increased over the last three months. During a staff meeting, several NCOs immediately recommend hiring additional personnel.\n\nAs the newly assigned officer, what should you recommend FIRST?","options":{"A":"Request additional manpower to reduce workload.","B":"Clarify and validate that a measurable performance problem actually exists.","C":"Develop countermeasures to reduce customer wait times.","D":"Conduct training for customer service representatives."},"answer":"B","section":"Problem Solving"},{"id":"s4q2","number":2,"prompt":"A maintenance flight experiences an increase in missed inspection deadlines. The flight chief wants to issue a new checklist immediately because the same issue happened last year.\n\nAccording to the Practical Problem-Solving Method, what is the BEST next action?","options":{"A":"Implement the checklist since it worked previously.","B":"Determine the current root cause before selecting a solution.","C":"Establish new performance targets.","D":"Standardize the previous checklist across the squadron."},"answer":"B","section":"Problem Solving"},{"id":"s4q3","number":3,"prompt":"During a contingency operation, an officer has only minutes to respond after receiving reports of changing enemy activity. There is insufficient time for extensive analysis.\n\nWhich problem-solving model is MOST appropriate?","options":{"A":"8-Step Practical Problem-Solving Method","B":"OODA Loop","C":"Performance Gap Analysis","D":"Future-State Mapping"},"answer":"B","section":"Problem Solving"},{"id":"s4q4","number":4,"prompt":"A logistics team identifies a recurring delay in processing supply requests. The team gathers data showing delays occur primarily during shift changes.\n\nWhich PPSM step are they MOST likely performing?","options":{"A":"Clarify and Validate the Problem","B":"Break Down the Problem and Identify Performance Gap","C":"Determine Root Cause","D":"Develop Countermeasures"},"answer":"B","section":"Problem Solving"},{"id":"s4q5","number":5,"prompt":"An improvement team develops several possible solutions after identifying the root cause of excessive aircraft turnaround times.\n\nWhich factor would be LEAST appropriate when evaluating countermeasures?","options":{"A":"Effectiveness","B":"Feasibility","C":"Personal preference of team members","D":"Organizational impact"},"answer":"C","section":"Problem Solving"},{"id":"s4q6","number":6,"prompt":"A commander wants to know whether a recently implemented solution actually improved mission performance.\n\nWhich PPSM step should provide this assessment?","options":{"A":"Determine Root Cause","B":"Confirm Results and Process","C":"Standardize Successful Processes","D":"Set Improvement Targets"},"answer":"B","section":"Problem Solving"},{"id":"s4q7","number":7,"prompt":"A work center solved a scheduling problem six months ago. Recently, the same problem has returned because new personnel were never taught the updated procedures.\n\nWhich PPSM step was MOST likely overlooked?","options":{"A":"Develop Countermeasures","B":"Determine Root Cause","C":"Standardize Successful Processes","D":"Break Down the Problem"},"answer":"C","section":"Problem Solving"},{"id":"s4q8","number":8,"prompt":"While conducting a \"Go and See,\" an officer personally observes technicians skipping required documentation steps instead of relying solely on secondhand reports.\n\nWhat principle is BEST demonstrated?","options":{"A":"Solutions should be based on assumptions.","B":"Leaders should verify current conditions firsthand.","C":"Metrics are more important than observation.","D":"Performance targets should be established before gathering facts."},"answer":"B","section":"Problem Solving"},{"id":"s4q9","number":9,"prompt":"A problem-solving team establishes a goal of reducing customer wait time by 20% within six months without increasing delays for another organization.\n\nThis target BEST demonstrates which B-SMART characteristic?","options":{"A":"Balanced","B":"Results Focused","C":"Timely","D":"Attainable"},"answer":"A","section":"Problem Solving"},{"id":"s4q10","number":10,"prompt":"An officer has already selected the best solution to a recurring issue. Before implementation, the team develops a document assigning responsibilities, timelines, coordination requirements, and milestone dates.\n\nWhat is the PRIMARY purpose of this document?","options":{"A":"Determine root causes.","B":"Evaluate KPIs.","C":"Communicate how the solution will be implemented.","D":"Identify performance gaps."},"answer":"C","section":"Problem Solving"},{"id":"s4q11","number":11,"prompt":"Which statement BEST reflects Step 1 of the PPSM?","options":{"A":"Clarifying the problem.","B":"Clarified and validated problems should be solved immediately.","C":"Clarify and validate the problem before attempting solutions.","D":"Problems are validated after countermeasures are developed."},"answer":"C","section":"Problem Solving"},{"id":"s4q12","number":12,"prompt":"According to the reader, which statement BEST describes \"Go and See\"?","options":{"A":"Leaders should rely primarily on reports submitted by supervisors.","B":"Leaders should observe work firsthand to establish cause-and-effect relationships based on facts.","C":"Leaders should compare metrics before observing operations.","D":"Leaders should interview customers before observing processes."},"answer":"B","section":"Problem Solving"},{"id":"s4q13","number":13,"prompt":"Which statement MOST accurately reflects the reader's description of the OODA Loop?","options":{"A":"OODA is a linear decision-making process.","B":"OODA is a continuous cycle that repeats until the problem is resolved.","C":"OODA always requires a team.","D":"OODA is designed primarily for long-term organizational improvement."},"answer":"B","section":"Problem Solving"},{"id":"s4q14","number":14,"prompt":"Which statement BEST reflects the reader's discussion of root causes?","options":{"A":"Symptoms should be corrected as quickly as possible.","B":"Teams should always identify the deepest possible root cause regardless of authority.","C":"Teams should identify the deepest root cause that remains within their sphere of influence.","D":"Root causes are usually identified after countermeasures are implemented."},"answer":"C","section":"Problem Solving"},{"id":"s4q15","number":15,"prompt":"The reader states that Step 8 is commonly skipped because teams often:","options":{"A":"begin collecting new KPIs.","B":"move immediately to another improvement effort instead of ensuring successful changes become standard.","C":"determine additional root causes.","D":"conduct another performance gap analysis."},"answer":"B","section":"Problem Solving"}]},{"title":"Critical Thinking","questions":[{"id":"s5q1","number":1,"prompt":"During a Wing staff meeting, an officer recommends immediately changing a maintenance procedure because several Airmen complained on social media that it was ineffective. No performance data has been reviewed.\n\nWhat is the BEST example of critical thinking?","options":{"A":"Accept the complaints because multiple Airmen share the same opinion.","B":"Delay the decision until relevant information is gathered and evaluated without allowing emotions or opinions to influence the outcome.","C":"Approve the recommendation because social media provides current information.","D":"Wait until leadership directs a decision."},"answer":"B","section":"Critical Thinking"},{"id":"s5q2","number":2,"prompt":"A commander receives two reports regarding declining morale.\n\nReport A contains survey data collected over six months.\n\nReport B contains several emotional testimonials from frustrated Airmen.\n\nBefore making a decision, what should the commander do FIRST?","options":{"A":"Accept the emotional testimonials because they are firsthand accounts.","B":"Evaluate whether the information is factual, objective, relevant, and complete.","C":"Average the opinions from both reports.","D":"Select the report supporting the commander's initial opinion."},"answer":"B","section":"Critical Thinking"},{"id":"s5q3","number":3,"prompt":"A Flight Commander tells her team,\n\n\"Our customer satisfaction has dropped.\"\n\nAn officer asks,\n\n\"By how much has it dropped, over what period, and compared to what standard?\"\n\nWhich intellectual standard is the officer MOST directly seeking?","options":{"A":"Logic","B":"Breadth","C":"Precision","D":"Fairness"},"answer":"C","section":"Critical Thinking"},{"id":"s5q4","number":4,"prompt":"A supervisor reviews only information supporting his belief that a new scheduling system is successful while ignoring multiple reports showing declining performance.\n\nWhich concept BEST describes his thinking?","options":{"A":"Breadth","B":"Confirmation Bias","C":"Deflection","D":"Accuracy"},"answer":"B","section":"Critical Thinking"},{"id":"s5q5","number":5,"prompt":"An officer receives a briefing describing an overseas event. The information appears factual but fails to explain opposing viewpoints or possible consequences.\n\nWhich intellectual standard is MOST lacking?","options":{"A":"Breadth","B":"Significance","C":"Precision","D":"Clarity"},"answer":"A","section":"Critical Thinking"},{"id":"s5q6","number":6,"prompt":"A staff meeting becomes focused on solving a problem. One member continually asks,\n\n\"What assumptions are we making that may not actually be true?\"\n\nWhich element of reasoning is the member emphasizing?","options":{"A":"Information","B":"Assumption","C":"Implication","D":"Purpose"},"answer":"B","section":"Critical Thinking"},{"id":"s5q7","number":7,"prompt":"A commander is deciding whether to implement a new process. Before approving it, she asks,\n\n\"What long-term effects will this decision have on future operations?\"\n\nWhich element of reasoning is she evaluating?","options":{"A":"Concept","B":"Implication","C":"Point of View","D":"Question"},"answer":"B","section":"Critical Thinking"},{"id":"s5q8","number":8,"prompt":"An officer immediately agrees with a recommendation because it came from the squadron's highest-performing NCO, without reviewing the evidence supporting the recommendation.\n\nWhich thinking error BEST applies?","options":{"A":"Belief Perseverance","B":"Halo Effect","C":"Deflection","D":"Confirmation Bias"},"answer":"B","section":"Critical Thinking"},{"id":"s5q9","number":9,"prompt":"A briefing includes numerous statistics, historical examples, personal opinions, and unrelated anecdotes.\n\nThe commander asks,\n\n\"Which of these pieces of information are actually important to today's decision?\"\n\nWhich intellectual standard is being applied?","options":{"A":"Relevance","B":"Significance","C":"Logic","D":"Accuracy"},"answer":"B","section":"Critical Thinking"},{"id":"s5q10","number":10,"prompt":"During a crisis response, an officer notices his initial reaction is based almost entirely on instinct and previous experience. Before issuing orders, he deliberately slows down and performs a detailed analysis.\n\nAccording to the reader, which transition is occurring?","options":{"A":"Confirmation Bias to Fairness","B":"System 2 to System 1","C":"System 1 to System 2","D":"Subjective Thinking to Objective Thinking"},"answer":"C","section":"Critical Thinking"},{"id":"s5q11","number":11,"prompt":"According to the reader, which statement BEST reflects the definition of critical thinking?","options":{"A":"Thinking carefully while balancing emotions with facts.","B":"Thinking carefully about a subject without allowing feelings or opinions to affect you.","C":"Solving problems using experience and intuition.","D":"Making decisions quickly using the best available information."},"answer":"B","section":"Critical Thinking"},{"id":"s5q12","number":12,"prompt":"Which statement is an Argument rather than simply a Statement?","options":{"A":"\"The mission begins at 0700.\"","B":"\"The mission should begin earlier because it will improve sortie generation.\"","C":"\"The mission began at 0700 yesterday.\"","D":"\"Today's weather is clear.\""},"answer":"B","section":"Critical Thinking"},{"id":"s5q13","number":13,"prompt":"The reader identifies which intellectual standard as the gateway standard?","options":{"A":"Accuracy","B":"Breadth","C":"Clarity","D":"Logic"},"answer":"C","section":"Critical Thinking"},{"id":"s5q14","number":14,"prompt":"According to the reader, which statement BEST describes confirmation bias?","options":{"A":"Accepting researched facts even when they challenge existing beliefs.","B":"Seeking information that confirms existing beliefs while discounting information that creates doubt.","C":"Trusting objective claims more than subjective claims.","D":"Carefully evaluating multiple perspectives before making a decision."},"answer":"B","section":"Critical Thinking"},{"id":"s5q15","number":15,"prompt":"According to the reader, leaders should be cautious of information that:","options":{"A":"Includes emotional language.","B":"Is presented by junior personnel.","C":"Omits information that could influence how an issue is perceived.","D":"Contains more than one conclusion."},"answer":"C","section":"Critical Thinking"}]},{"title":"Team Building","questions":[{"id":"s6q1","number":1,"prompt":"Capt Reynolds recently assumed command of the Force Support Flight. During the first two weeks, he notices that the newly formed process improvement team is polite during meetings, hesitant to offer opinions, and frequently asks about meeting expectations, reporting procedures, and decision-making authority. Although several members previously worked together on unrelated projects, most are unfamiliar with one another in their current roles. The commander considers intervening but decides to observe one more meeting before taking action.\n\nWhich stage of team development is the team MOST likely experiencing?","options":{"A":"Storming","B":"Norming","C":"Forming","D":"Performing"},"answer":"C","section":"Team Building"},{"id":"s6q2","number":2,"prompt":"A Civil Engineer Squadron assembled a team to improve dormitory maintenance response times. During the first month, disagreements became common. Several members openly challenged the team lead's decisions, while others insisted their previous work methods were superior. Meetings often ended without consensus, and members became frustrated with the slow progress. Despite the tension, team members gradually began understanding each other's strengths and expectations.\n\nWhat stage of team development BEST describes the team's current condition?","options":{"A":"Performing","B":"Storming","C":"Forming","D":"Norming"},"answer":"B","section":"Team Building"},{"id":"s6q3","number":3,"prompt":"A Communications Squadron has been working together for nearly six months on improving network reliability. The team has resolved most interpersonal conflicts, members willingly help one another, roles are clearly understood, and meetings now focus almost entirely on accomplishing objectives rather than resolving disagreements. The commander notes that cooperation has noticeably improved since the project began.\n\nWhich stage has the team MOST likely entered?","options":{"A":"Forming","B":"Storming","C":"Norming","D":"Performing"},"answer":"C","section":"Team Building"},{"id":"s6q4","number":4,"prompt":"A Logistics Readiness Squadron has spent nearly a year refining deployment processing procedures. During a recent exercise, the team independently adjusted workloads, solved unexpected problems, reassigned responsibilities without direction from leadership, and completed the mission ahead of schedule. During the after-action review, members openly discussed both strengths and weaknesses without assigning blame.\n\nWhich stage BEST describes the team's development?","options":{"A":"Forming","B":"Storming","C":"Norming","D":"Performing"},"answer":"D","section":"Team Building"},{"id":"s6q5","number":5,"prompt":"Capt Ramirez notices that several members of her planning team have begun discussing concerns privately after meetings rather than raising them during discussions. While meetings remain professional, important disagreements are no longer openly addressed. Some members have become reluctant to offer recommendations because they fear criticism from more experienced teammates.\n\nWhich leader action would BEST strengthen the team's effectiveness?","options":{"A":"Encourage open and honest communication while discouraging side conversations and cliques.","B":"Replace members who disagree with one another.","C":"Limit discussion to maintain meeting efficiency.","D":"Require all communication to flow only through the team leader."},"answer":"A","section":"Team Building"},{"id":"s6q6","number":6,"prompt":"A maintenance team consistently meets production goals, but individual members frequently compete for recognition. Several Airmen intentionally avoid sharing successful techniques because they want to receive individual praise during quarterly awards. Although productivity remains acceptable, teamwork has noticeably declined.\n\nAccording to the reading, which leader action would MOST directly improve cooperation?","options":{"A":"Increase competition by recognizing only the highest-performing individual.","B":"Reemphasize individual roles and responsibilities to reduce power-play behavior.","C":"Assign members to work independently.","D":"Eliminate feedback sessions to avoid conflict."},"answer":"B","section":"Team Building"},{"id":"s6q7","number":7,"prompt":"A recently assigned lieutenant notices that one of the most experienced NCOs openly shares concerns during meetings but consistently tells junior Airmen afterward that leadership \"never listens anyway.\" Other members have begun expressing less confidence during meetings and participate less than they did previously.\n\nWhich team characteristic is MOST directly being weakened?","options":{"A":"Cooperation","B":"Trust","C":"Performing","D":"Communication"},"answer":"B","section":"Team Building"},{"id":"s6q8","number":8,"prompt":"A medical group assembles a cross-functional team to improve patient scheduling. Before making recommendations, the team lead distributes all available scheduling data, encourages every member to contribute ideas regardless of rank, and reminds the team that disagreement is acceptable if conducted professionally. Several junior members identify issues that senior personnel had overlooked.\n\nWhich leader behavior MOST contributed to the team's effectiveness?","options":{"A":"Limiting discussion to subject matter experts.","B":"Sharing necessary information while encouraging open communication.","C":"Allowing only senior members to evaluate ideas.","D":"Delaying discussion until complete agreement exists."},"answer":"B","section":"Team Building"},{"id":"s6q9","number":9,"prompt":"During an exercise, an officer notices that one member frequently interrupts others, dismisses alternative ideas without discussion, and attempts to receive credit for every successful outcome. The remaining members have become noticeably quieter and less willing to participate.\n\nWhich behavior from the reading is MOST likely occurring?","options":{"A":"Healthy competition","B":"Power struggle (\"all-starring\")","C":"Norming","D":"Trust building"},"answer":"B","section":"Team Building"},{"id":"s6q10","number":10,"prompt":"A newly appointed project officer believes the fastest way to build an effective team is to encourage honest feedback while also modeling respectful communication. During meetings, the officer openly accepts constructive criticism, shares information freely, and consistently addresses disagreements directly with those involved instead of discussing them privately afterward.\n\nWhich leadership principle is the officer MOST directly demonstrating?","options":{"A":"Leaders should establish trust by setting the example.","B":"Leaders should discourage disagreement whenever possible.","C":"Leaders should rely primarily on formal authority.","D":"Leaders should postpone feedback until the performing stage."},"answer":"A","section":"Team Building"},{"id":"s6q11","number":11,"prompt":"Capt Wilson was appointed to lead a newly established innovation team consisting of Airmen from five different squadrons. During the first week, members spent most meetings asking questions about expectations, learning one another's backgrounds, and discussing how decisions would be made. The captain has not yet observed significant disagreements, but several members remain cautious about openly sharing opinions. At the conclusion of the second meeting, the captain directed the team to continue establishing procedures before beginning detailed project planning.\n\nWhich stage is the team MOST likely experiencing?","options":{"A":"Storming","B":"Forming","C":"Norming","D":"Performing"},"answer":"B","section":"Team Building"},{"id":"s6q12","number":12,"prompt":"A squadron improvement team spent several weeks arguing over project priorities and work methods. After multiple meetings, members began accepting one another's roles, conflicts became less personal, and cooperation noticeably increased. The team has not yet demonstrated the flexibility and independent problem-solving associated with highly mature teams.\n\nWhich stage BEST describes the team's CURRENT condition?","options":{"A":"Storming","B":"Forming","C":"Norming","D":"Performing"},"answer":"C","section":"Team Building"},{"id":"s6q13","number":13,"prompt":"During a Wing exercise, a team leader noticed that several members were withholding important information because they believed another section would receive most of the credit for mission success. The leader immediately met with the team, clarified everyone's responsibilities, emphasized how dependent each section was upon the others, and reminded members that mission accomplishment—not individual recognition—was the team's objective. Although cooperation improved, several members continued learning how to work effectively together.\n\nWhich leader action MOST directly addressed the problem described?","options":{"A":"Increasing competition to improve performance.","B":"Reemphasizing roles and encouraging cooperation.","C":"Waiting for the performing stage before intervening.","D":"Restricting information sharing to supervisors."},"answer":"B","section":"Team Building"},{"id":"s6q14","number":14,"prompt":"Capt Lewis observed that her project team openly challenged ideas during meetings, but discussions remained professional and focused on improving the final product. Team members regularly exchanged feedback, admitted mistakes without fear of embarrassment, and continued sharing ideas despite disagreements. One senior NCO commented afterward that the team was \"arguing more than ever.\"\n\nBased on the reading, which conclusion is MOST supported?","options":{"A":"The team lacks trust because disagreements still occur.","B":"The team demonstrates trust because members communicate openly despite disagreement.","C":"The team has returned to the forming stage.","D":"The team should eliminate disagreements to improve cohesion."},"answer":"B","section":"Team Building"},{"id":"s6q15","number":15,"prompt":"A Disaster Response Team has worked together for nearly ten months. Members routinely adjust responsibilities without direction, diagnose problems as they arise, implement improvements during operations, and openly discuss both strengths and weaknesses after each mission. Last week, two new members joined the team. During their first meeting, the new Airmen asked numerous questions about expectations and team procedures while the rest of the team continued operating efficiently.\n\nWhich statement is the BEST conclusion?","options":{"A":"The entire team has returned to the forming stage.","B":"The original team is performing, while the new members are individually experiencing forming behaviors.","C":"The team is currently storming because new members asked questions.","D":"The entire team has entered norming because expectations were discussed."},"answer":"B","section":"Team Building"}]},{"title":"Full-Range Leadership (FRL)","questions":[{"id":"s7q1","number":1,"prompt":"Capt Mason recently assumed command of the Logistics Readiness Squadron after serving as an aircraft maintenance officer for three assignments. During his first month, he intentionally avoids becoming involved in flight operations because he believes experienced NCOs should solve every issue independently. Although several supervisors request guidance regarding conflicting priorities, he tells them to \"work it out yourselves.\" Over the next several weeks, confusion increases, deadlines are missed, and disagreements between sections continue unresolved. During the commander's update briefing, Capt Mason explains that avoiding involvement encourages independence and initiative.\n\nWhich leadership approach is Capt Mason MOST directly demonstrating?","options":{"A":"Contingent Reward","B":"Management by Exception–Passive","C":"Transformational Leadership","D":"Laissez-Faire Leadership"},"answer":"D","section":"Full-Range Leadership (FRL)"},{"id":"s7q2","number":2,"prompt":"Before a major Operational Readiness Exercise, Col Evans gathers the wing in the hangar. She describes why the exercise matters, explains how today's efforts prepare Airmen for future combat operations, and expresses complete confidence that every member can exceed expectations. Her enthusiasm energizes the audience, and many Airmen later remark they felt inspired to accomplish more than they originally believed possible.\n\nWhich transformational behavior is MOST directly demonstrated?","options":{"A":"Idealized Influence","B":"Inspirational Motivation","C":"Intellectual Stimulation","D":"Individualized Consideration"},"answer":"B","section":"Full-Range Leadership (FRL)"},{"id":"s7q3","number":3,"prompt":"Capt Wilson routinely volunteers for the least desirable duties before assigning them to anyone else. During a recent equipment accountability issue, she immediately accepted responsibility for her oversight before discussing corrective actions with the team. She consistently places mission and team needs above personal recognition, and her Airmen frequently describe her as someone who always \"does the right thing, even when nobody is watching.\"\n\nWhich transformational behavior BEST describes Capt Wilson?","options":{"A":"Inspirational Motivation","B":"Idealized Influence","C":"Individualized Consideration","D":"Intellectual Stimulation"},"answer":"B","section":"Full-Range Leadership (FRL)"},{"id":"s7q4","number":4,"prompt":"During a process improvement meeting, Lt Harper asks every Airman, regardless of rank, to challenge current procedures. When one Airman proposes an unconventional solution, Harper encourages the discussion instead of dismissing the idea. Even after the proposal ultimately proves unsuccessful, Harper thanks the member for taking a thoughtful risk and asks the team what they learned from the experience before exploring additional ideas.\n\nWhich transformational behavior is MOST directly demonstrated?","options":{"A":"Inspirational Motivation","B":"Individualized Consideration","C":"Intellectual Stimulation","D":"Idealized Influence"},"answer":"C","section":"Full-Range Leadership (FRL)"},{"id":"s7q5","number":5,"prompt":"MSgt Collins notices that a newly assigned Airman has struggled adjusting to military life. Over several months, Collins schedules regular feedback sessions, listens carefully to personal concerns, helps establish professional goals, recommends education opportunities, and tailors developmental assignments to match the Airman's strengths and aspirations.\n\nWhich transformational behavior BEST describes MSgt Collins?","options":{"A":"Individualized Consideration","B":"Intellectual Stimulation","C":"Inspirational Motivation","D":"Idealized Influence"},"answer":"A","section":"Full-Range Leadership (FRL)"},{"id":"s7q6","number":6,"prompt":"A Maintenance Flight Commander routinely walks the flight line throughout the duty day, observes maintenance practices, immediately corrects technical order violations, and provides feedback before small mistakes become significant safety concerns.\n\nWhich transactional behavior is MOST directly demonstrated?","options":{"A":"Contingent Reward","B":"Management by Exception–Passive","C":"Management by Exception–Active","D":"Laissez-Faire"},"answer":"C","section":"Full-Range Leadership (FRL)"},{"id":"s7q7","number":7,"prompt":"For several weeks, a supervisor receives reports that Airmen are routinely bypassing required quality assurance procedures. Believing the issue will resolve itself, the supervisor delays intervening until a major equipment failure forces the squadron to suspend operations pending investigation.\n\nWhich leadership behavior BEST describes the supervisor?","options":{"A":"Contingent Reward","B":"Management by Exception–Active","C":"Inspirational Motivation","D":"Management by Exception–Passive"},"answer":"D","section":"Full-Range Leadership (FRL)"},{"id":"s7q8","number":8,"prompt":"A squadron commander announces that every section completing inventory ahead of schedule will receive a three-day pass. The commander clearly explains expectations before the project begins and awards the incentive immediately after each section successfully completes the assigned tasks.\n\nWhich leadership behavior is MOST directly demonstrated?","options":{"A":"Inspirational Motivation","B":"Contingent Reward","C":"Idealized Influence","D":"Intellectual Stimulation"},"answer":"B","section":"Full-Range Leadership (FRL)"},{"id":"s7q9","number":9,"prompt":"A flight commander is preparing Airmen for an upcoming inspection. The team is highly experienced but has recently become complacent. Some Airmen have stopped questioning outdated procedures, while others have become hesitant to suggest improvements because previous ideas were dismissed without discussion.\n\nWhich leadership action would BEST apply Full-Range Leadership?","options":{"A":"Increase inspections and correct every mistake immediately.","B":"Encourage innovative thinking, welcome alternative solutions, and support thoughtful risk-taking while maintaining required standards.","C":"Offer a day off for every new improvement idea submitted.","D":"Avoid involvement unless standards are violated."},"answer":"B","section":"Full-Range Leadership (FRL)"},{"id":"s7q10","number":10,"prompt":"Capt Ramirez notices declining morale after several months of high operations tempo. During one-on-one feedback sessions, she learns that different Airmen are motivated by different things. Some desire greater responsibility, others need additional coaching, and a few simply want recognition for their efforts. She adjusts her leadership approach to meet each individual's developmental needs while continuing to communicate the squadron's vision and maintaining accountability for established standards.\n\nWhich statement BEST reflects applying the Full-Range Leadership Model?","options":{"A":"Effective leaders primarily rely on one leadership behavior for consistency.","B":"Effective leaders select leadership behaviors appropriate to followers and the situation.","C":"Transactional leadership should replace transformational leadership whenever standards exist.","D":"Transformational leadership eliminates the need for transactional leadership."},"answer":"B","section":"Full-Range Leadership (FRL)"},{"id":"s7q11","number":11,"prompt":"MBE-A vs MBE-P\n\nMaj Dawson has already established performance standards and routinely reviews maintenance documentation throughout the week. Yesterday, she identified two deviations from technical orders and immediately corrected both Airmen before the errors affected aircraft generation. During today's staff meeting, another officer remarked that Dawson \"waited until the problem occurred before acting.\"\n\nBased on the reader, which statement is MOST accurate?","options":{"A":"Maj Dawson demonstrated MBE-P because errors occurred.","B":"Maj Dawson demonstrated MBE-A because she corrected deviations as soon as they were identified.","C":"Maj Dawson demonstrated Laissez-Faire leadership.","D":"Maj Dawson demonstrated Individualized Consideration."},"answer":"B","section":"Full-Range Leadership (FRL)"},{"id":"s7q12","number":12,"prompt":"II vs IM\n\n\"Most Directly\"\n\nA commander concluded every Commander's Call by describing a compelling vision for the future, expressing confidence in every Airman, and motivating the wing to exceed expectations. During the same month, the commander also volunteered alongside junior Airmen during weekend base cleanup projects and consistently accepted personal responsibility for organizational shortcomings.\n\nWhich transformational behavior is demonstrated MOST DIRECTLY by the commander's speeches?","options":{"A":"Idealized Influence","B":"Inspirational Motivation","C":"Intellectual Stimulation","D":"Individualized Consideration"},"answer":"B","section":"Full-Range Leadership (FRL)"},{"id":"s7q13","number":13,"prompt":"IS vs IC\n\nVerb Tense\n\nDuring an innovation workshop, Capt Fields asked every participant to challenge long-standing assumptions, consider opposing viewpoints, and propose unconventional solutions to recurring scheduling problems. After the workshop concluded, Capt Fields met individually with one Airman to discuss graduate school opportunities and long-term career goals.\n\nWhich transformational behavior is MOST directly demonstrated during the workshop?","options":{"A":"Intellectual Stimulation","B":"Individualized Consideration","C":"Inspirational Motivation","D":"Idealized Influence"},"answer":"A","section":"Full-Range Leadership (FRL)"},{"id":"s7q14","number":14,"prompt":"Extrinsic vs Psychological Reward\n\nBEST Answer\n\nA squadron commander publicly praises an Airman for developing an innovative scheduling process that reduced overtime. The commander does not provide time off, promotion recommendations, awards, or monetary incentives. Instead, the commander explains how the Airman's initiative supports the squadron's vision and thanks the Airman in front of peers.\n\nBased on the reader, which statement is MOST accurate?","options":{"A":"The commander is using Contingent Reward because praise is a psychological reward that trends toward a transformational approach.","B":"The commander is demonstrating MBE-A.","C":"The commander is demonstrating Laissez-Faire.","D":"The commander is avoiding transactional leadership altogether."},"answer":"A","section":"Full-Range Leadership (FRL)"},{"id":"s7q15","number":15,"prompt":"Two Right Answers\n\nBEST Application\n\nComprehensive\n\nA newly assigned flight commander inherited a technically proficient organization with declining innovation, inconsistent accountability, and little personal interaction between supervisors and Airmen. Over the next six months, the commander has already implemented regular mentoring sessions, encouraged Airmen to challenge outdated procedures, communicated an inspiring vision for future operations, and continued correcting technical standard violations immediately when they occurred.\n\nWhich statement BEST describes the commander's leadership approach?","options":{"A":"The commander primarily demonstrated transactional leadership.","B":"The commander relied almost exclusively on transformational leadership.","C":"The commander appropriately applied Full-Range Leadership by integrating transformational behaviors while maintaining necessary transactional leadership.","D":"The commander should discontinue corrective leadership behaviors because they inhibit innovation."},"answer":"C","section":"Full-Range Leadership (FRL)"}]},{"title":"Followership","questions":[{"id":"s8q1","number":1,"prompt":"A newly assigned first lieutenant joins a planning team developing procedures for an upcoming readiness exercise. During meetings, the lieutenant independently researches assigned topics, respectfully questions assumptions when evidence suggests a better approach, and openly supports the team's final decision once a course of action is selected. When disagreements arise, the lieutenant focuses on the mission rather than personal recognition and willingly accepts additional responsibilities to help the team meet its deadline.\n\nWhich followership style is the lieutenant MOST likely demonstrating?","options":{"A":"Passive Follower","B":"Alienated Follower","C":"Pragmatist","D":"Effective Follower"},"answer":"D","section":"Followership"}
