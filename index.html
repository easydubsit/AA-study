n 700 assigned personnel. During the first ninety days, the commander studied organizational climate, reviewed DEOCS results, openly discussed strengths and weaknesses with the unit, emphasized the mission, vision, and organizational priorities, empowered subordinate leaders, recognized positive contributions, and continuously monitored how everyday leadership behaviors affected the work environment. Although no single initiative dramatically changed the organization overnight, supervisors gradually observed increasing trust, openness, and collaboration across multiple squadrons while the unit maintained high performance standards.\n\nWhich conclusion BEST reflects the lesson?","options":{"A":"Organizational climate changes primarily through a single major initiative implemented immediately after a DEOCS.","B":"Positive organizational climate develops when leaders intentionally understand the existing climate, communicate openly, inspire action, maintain safe and secure environments with high standards, and recognize that everyday leadership behaviors continually influence how personnel perceive their organization.","C":"Organizational climate and organizational culture should be treated as interchangeable concepts during organizational change.","D":"Long-term organizational traditions are generally easier to change than current attitudes and perceptions."},"answer":"B","section":"Organizational Climate"}]},{"title":"National Security","questions":[{"id":"s14q1","number":1,"prompt":"A U.S. official meets with foreign leaders to negotiate an agreement, strengthen an alliance, and gain support for a multinational operation.\n\nWhich instrument of national power is being used MOST directly?","options":{"A":"Economic","B":"Informational","C":"Diplomatic","D":"Military"},"answer":"C","section":"National Security"},{"id":"s14q2","number":2,"prompt":"The United States imposes trade restrictions and tariffs on another country to influence its behavior.\n\nWhich instrument of national power is demonstrated?","options":{"A":"Diplomatic","B":"Economic","C":"Informational","D":"Military"},"answer":"B","section":"National Security"},{"id":"s14q3","number":3,"prompt":"The United States sponsors international student exchanges and cultural programs to improve foreign understanding of American values and society.\n\nWhich instrument of national power is being used?","options":{"A":"Informational","B":"Military","C":"Economic","D":"Diplomatic"},"answer":"A","section":"National Security"},{"id":"s14q4","number":4,"prompt":"The United States deploys military aircraft to a region to demonstrate commitment to its allies and discourage an adversary from taking aggressive action.\n\nWhich instrument of national power is being used MOST directly?","options":{"A":"Economic","B":"Diplomatic","C":"Informational","D":"Military"},"answer":"D","section":"National Security"},{"id":"s14q5","number":5,"prompt":"Which statement BEST describes how the instruments of national power should normally be employed?","options":{"A":"Each instrument should be used independently to prevent overlap.","B":"The military instrument should direct the other three instruments.","C":"The instruments should be coordinated and used together to support national objectives.","D":"The diplomatic instrument should be used only after military options fail."},"answer":"C","section":"National Security"},{"id":"s14q6","number":6,"prompt":"Who has ultimate responsibility for making and executing U.S. national security policy?","options":{"A":"Secretary of Defense","B":"Chairman of the Joint Chiefs of Staff","C":"President","D":"Secretary of State"},"answer":"C","section":"National Security"},{"id":"s14q7","number":7,"prompt":"Which document describes how the President plans to use the instruments of national power to achieve national objectives?","options":{"A":"National Military Strategy","B":"National Defense Strategy","C":"National Security Strategy","D":"Service strategy and policy"},"answer":"C","section":"National Security"},{"id":"s14q8","number":8,"prompt":"Which sequence correctly shows the progression of national strategic direction?","options":{"A":"National Military Strategy → National Security Strategy → National Defense Strategy","B":"National objectives → National Security Strategy → National Defense Strategy → National Military Strategy","C":"National Defense Strategy → National objectives → National Military Strategy","D":"National Security Strategy → National Military Strategy → National objectives"},"answer":"B","section":"National Security"},{"id":"s14q9","number":9,"prompt":"Which pairing is correct?","options":{"A":"President — National Military Strategy","B":"Secretary of Defense — National Security Strategy","C":"Chairman of the Joint Chiefs of Staff — National Military Strategy","D":"Secretary of State — National Defense Strategy"},"answer":"C","section":"National Security"},{"id":"s14q10","number":10,"prompt":"A planner identifies the objective as “deter aggression against U.S. allies.”\n\nUnder the ends, ways, and means model, this objective is the:","options":{"A":"End","B":"Way","C":"Means","D":"Resource"},"answer":"A","section":"National Security"},{"id":"s14q11","number":11,"prompt":"A strategy states that the United States will accomplish its objective by building a multinational coalition and maintaining a forward presence.\n\nUnder the ends, ways, and means model, these actions are the:","options":{"A":"Ends","B":"Ways","C":"Means","D":"National interests"},"answer":"B","section":"National Security"},{"id":"s14q12","number":12,"prompt":"An Air Force unit changes its training priorities after national strategy identifies the need for a more resilient Joint Force.\n\nWhich conclusion is BEST supported by the lesson?","options":{"A":"National strategic direction affects only senior civilian leaders.","B":"Service policies and daily military operations are influenced by national strategy.","C":"Unit training decisions are separate from national objectives.","D":"The military independently establishes national interests."},"answer":"B","section":"National Security"}]},{"title":"What Is War","questions":[{"id":"s15q1","number":1,"prompt":"Which statement best describes Clausewitz’s definition of war?","options":{"A":"War is a competition for economic advantage between nations.","B":"War is an act of violence used to compel an opponent to do one’s will.","C":"War is a temporary failure of military planning.","D":"War is the use of diplomacy to avoid physical conflict."},"answer":"B","section":"What Is War"},{"id":"s15q2","number":2,"prompt":"Which two inseparable aspects of war are identified in the lesson?","options":{"A":"Strategy and tactics","B":"Fog and friction","C":"Policy and violence","D":"Traditional and irregular warfare"},"answer":"C","section":"What Is War"},{"id":"s15q3","number":3,"prompt":"Which statement correctly distinguishes the nature of war from the character of war?","options":{"A":"The nature of war changes with technology, while its character remains constant.","B":"The nature of war is unchanging, while its character changes with political, military, economic, and technological conditions.","C":"Both the nature and character of war remain constant.","D":"Both the nature and character of war change whenever new weapons are introduced."},"answer":"B","section":"What Is War"},{"id":"s15q4","number":4,"prompt":"Which list contains Clausewitz’s three enduring truths?","options":{"A":"War is an instrument of policy; war is a complex and chaotic human endeavor; war is a clash of opposing wills.","B":"War is always total; war is controlled by technology; war ends when military forces are destroyed.","C":"War is an economic contest; war is a diplomatic failure; war is determined by superior weapons.","D":"War is a struggle for territory; war is predictable; war is decided at the tactical level."},"answer":"A","section":"What Is War"},{"id":"s15q5","number":5,"prompt":"A government uses military force to achieve a defined political objective and ends the conflict once that objective is accomplished.\n\nWhich enduring truth is most directly illustrated?","options":{"A":"War is a clash of opposing wills.","B":"War is an instrument of policy.","C":"War is dominated by chance.","D":"War is always irregular."},"answer":"B","section":"What Is War"},{"id":"s15q6","number":6,"prompt":"Which statement best explains the relationship between political objectives and military action?","options":{"A":"Military action should continue until all enemy forces are destroyed, regardless of policy.","B":"Political objectives should guide the scope, intensity, and conduct of military action.","C":"Political leaders should avoid influencing military operations once war begins.","D":"Military objectives replace political objectives during conflict."},"answer":"B","section":"What Is War"},{"id":"s15q7","number":7,"prompt":"During an operation, commanders receive incomplete reports, conflicting intelligence, and more information than they can effectively process.\n\nWhich factor dominating war is demonstrated?","options":{"A":"Chance","B":"Friction","C":"Fog","D":"Policy"},"answer":"C","section":"What Is War"},{"id":"s15q8","number":8,"prompt":"A military plan appears simple, but poor roads, equipment failures, delays, and logistical problems cause the operation to fall behind schedule.\n\nWhich factor dominating war is demonstrated?","options":{"A":"Fog","B":"Friction","C":"Chance","D":"Violence"},"answer":"B","section":"What Is War"},{"id":"s15q9","number":9,"prompt":"A bomb intended to kill an enemy leader fails because a heavy table leg unexpectedly deflects the blast.\n\nWhich factor dominating war is demonstrated?","options":{"A":"Fog","B":"Friction","C":"Chance","D":"Policy"},"answer":"C","section":"What Is War"},{"id":"s15q10","number":10,"prompt":"Which statement best describes traditional warfare?","options":{"A":"A population-centered struggle that favors indirect and asymmetric approaches.","B":"Force-on-force operations between adversaries using conventional military capabilities.","C":"Competition conducted entirely without military forces.","D":"A conflict focused primarily on influencing international media."},"answer":"B","section":"What Is War"},{"id":"s15q11","number":11,"prompt":"Which statement best describes irregular warfare?","options":{"A":"A struggle for influence and legitimacy over relevant populations that favors indirect and asymmetric approaches.","B":"A force-on-force struggle designed only to destroy conventional military formations.","C":"A form of warfare conducted only by non-state actors.","D":"A conflict in which political objectives are absent."},"answer":"A","section":"What Is War"},{"id":"s15q12","number":12,"prompt":"A weaker force avoids large conventional battles and instead uses guerrilla tactics over a long period to exhaust a stronger opponent’s resources and will.\n\nWhich form of warfare is being used?","options":{"A":"Traditional warfare","B":"Irregular warfare","C":"Strategic warfare","D":"Tactical warfare"},"answer":"B","section":"What Is War"},{"id":"s15q13","number":13,"prompt":"Which statement best describes the relationship between traditional and irregular warfare?","options":{"A":"A conflict must remain exclusively traditional or irregular from beginning to end.","B":"Traditional and irregular warfare are mutually exclusive.","C":"Actual warfare may combine both forms and may rapidly evolve from one form to the other.","D":"Irregular warfare always replaces traditional warfare once combat begins."},"answer":"C","section":"What Is War"}]},{"title":"What the DAF Brings to the Fight","questions":[{"id":"s16q1","number":1,"prompt":"Which statement best describes airpower?","options":{"A":"The ability to defend military installations using ground-based systems","B":"The ability to project military power through control and exploitation in, from, and through the air","C":"The ability to move military forces exclusively within the continental United States","D":"The ability to provide intelligence through space-based systems only"},"answer":"B","section":"What the DAF Brings to the Fight"},{"id":"s16q2","number":2,"prompt":"Which statement best describes military spacepower?","options":{"A":"The ability to accomplish military objectives in, from, and to the space domain","B":"The ability to launch civilian satellites into orbit","C":"The ability to conduct military operations only from terrestrial locations","D":"The ability to replace airpower during joint operations"},"answer":"A","section":"What the DAF Brings to the Fight"},{"id":"s16q3","number":3,"prompt":"Which list contains the five USAF core functions?","options":{"A":"Air superiority, global precision attack, rapid global mobility, global ISR, and command and control","B":"Air superiority, space access, cyberspace warfare, airlift, and intelligence","C":"Global precision attack, space control, sustainment, protection, and targeting","D":"Command and control, intelligence, fires, movement and maneuver, and protection"},"answer":"A","section":"What the DAF Brings to the Fight"},{"id":"s16q4","number":4,"prompt":"A joint force commander needs friendly forces to operate at a specific time and place without prohibitive interference from enemy air and missile threats.\n\nWhich USAF core function most directly supports this requirement?","options":{"A":"Global ISR","B":"Rapid global mobility","C":"Air superiority","D":"Global precision attack"},"answer":"C","section":"What the DAF Brings to the Fight"},{"id":"s16q5","number":5,"prompt":"Which condition exists when neither opposing force has control of the air?","options":{"A":"Air supremacy","B":"Air superiority","C":"Air parity","D":"Air dominance"},"answer":"C","section":"What the DAF Brings to the Fight"},{"id":"s16q6","number":6,"prompt":"Which condition exists when an opposing force is incapable of effective interference within the operational area using air and missile threats?","options":{"A":"Air parity","B":"Air supremacy","C":"Air superiority","D":"Defensive counterair"},"answer":"B","section":"What the DAF Brings to the Fight"},{"id":"s16q7","number":7,"prompt":"A commander directs an operation to strike an enemy target rapidly and precisely from a great distance in order to create decisive effects.\n\nWhich USAF core function is being employed?","options":{"A":"Global precision attack","B":"Rapid global mobility","C":"Global ISR","D":"Command and control"},"answer":"A","section":"What the DAF Brings to the Fight"},{"id":"s16q8","number":8,"prompt":"Air Force aircraft transport personnel and equipment into a theater, refuel aircraft in flight, and evacuate wounded personnel under medical supervision.\n\nWhich USAF core function includes these activities?","options":{"A":"Air superiority","B":"Global precision attack","C":"Rapid global mobility","D":"Global ISR"},"answer":"C","section":"What the DAF Brings to the Fight"},{"id":"s16q9","number":9,"prompt":"Sensors collect information about an adversary, but analysts must process and interpret that information before it becomes intelligence.\n\nWhich USAF core function is being described?","options":{"A":"Global ISR","B":"Command and control","C":"Air superiority","D":"Rapid global mobility"},"answer":"A","section":"What the DAF Brings to the Fight"},{"id":"s16q10","number":10,"prompt":"Which statement best describes command and control?","options":{"A":"The collection of information about foreign military forces","B":"The exercise of authority and direction by a properly designated commander over assigned and attached forces","C":"The movement of personnel and equipment by air","D":"The destruction of enemy forces through precision weapons"},"answer":"B","section":"What the DAF Brings to the Fight"},{"id":"s16q11","number":11,"prompt":"Which list contains the three USSF core functions?","options":{"A":"Space control, global mission operations, and space access","B":"Space superiority, missile defense, and satellite communications","C":"Intelligence, cyberspace operations, and command and control","D":"Orbital warfare, electromagnetic warfare, and cyberspace warfare"},"answer":"A","section":"What the DAF Brings to the Fight"},{"id":"s16q12","number":12,"prompt":"Space forces conduct offensive and defensive counterspace operations to contest and control the space domain.\n\nWhich USSF core function is being performed?","options":{"A":"Space access","B":"Global mission operations","C":"Space control","D":"Space domain awareness"},"answer":"C","section":"What the DAF Brings to the Fight"},{"id":"s16q13","number":13,"prompt":"A Space Force unit provides satellite communications, navigation support, missile warning, and space-based sensing to give the joint force a combat advantage.\n\nWhich USSF core function is being performed?","options":{"A":"Space control","B":"Global mission operations","C":"Space access","D":"Enterprise support"},"answer":"B","section":"What the DAF Brings to the Fight"},{"id":"s16q14","number":14,"prompt":"Which statement best describes the role of doctrine?","options":{"A":"Doctrine is a mandatory set of instructions that removes the need for judgment.","B":"Doctrine provides fundamental principles that guide military action and requires judgment in application.","C":"Doctrine applies only to senior commanders during major combat operations.","D":"Doctrine remains unchanged even when experience and technology evolve."},"answer":"B","section":"What the DAF Brings to the Fight"}]}];
const $=id=>document.getElementById(id);
const flat=DATA.flatMap(s=>s.questions);
let state={questions:[],index:0,answers:[],correct:0,mode:'study',locked:false};
const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function savedMissed(){try{return JSON.parse(localStorage.getItem('otsMissed')||'[]')}catch{return[]}}
function saveMissed(ids){localStorage.setItem('otsMissed',JSON.stringify([...new Set(ids)]));updateMissedButton()}
function updateMissedButton(){const n=savedMissed().length;$('missedBtn').textContent=`Practice Saved Missed Questions (${n})`;$('missedBtn').disabled=n===0;$('clearMissedBtn').disabled=n===0}
function init(){
 $('lessonList').innerHTML=DATA.map((s,i)=>`<label class="lesson-item"><input type="checkbox" value="${i}" checked><span>${s.title} <span class="muted">(${s.questions.length})</span></span></label>`).join('');
 $('setupMsg').textContent=`${DATA.length} lessons • ${flat.length} total questions`;
 updateMissedButton();
}
function selectedQuestions(){const ids=[...document.querySelectorAll('#lessonList input:checked')].map(x=>+x.value);return ids.flatMap(i=>DATA[i].questions)}
function begin(custom=null){
 let pool=custom||selectedQuestions(); if(!pool.length){$('setupMsg').textContent='Select at least one lesson.';return}
 state.mode=$('mode').value; let qs=[...pool]; if($('order').value==='shuffle')qs=shuffle(qs);
 const count=$('count').value;if(!custom&&count!=='all')qs=qs.slice(0,Math.min(+count,qs.length));
 state={questions:qs,index:0,answers:[],correct:0,mode:state.mode,locked:false};
 $('setup').classList.add('hidden');$('results').classList.add('hidden');$('quiz').classList.remove('hidden');render();
}
function render(){
 const q=state.questions[state.index];state.locked=false;$('feedback').className='feedback hidden';$('feedback').textContent='';$('nextBtn').disabled=true;
 $('sectionBadge').textContent=q.section;$('qCounter').textContent=`Question ${state.index+1} of ${state.questions.length}`;
 $('progress').style.width=`${(state.index/state.questions.length)*100}%`;
 $('liveScore').textContent=state.mode==='study'?`${state.correct} correct`:'Exam mode';$('questionText').textContent=q.prompt;
 let entries=Object.entries(q.options);if($('answerOrder').value==='shuffle')entries=shuffle(entries);
 $('options').innerHTML='';entries.forEach(([letter,text])=>{const b=document.createElement('button');b.className='option';b.dataset.letter=letter;b.innerHTML=`<span class="letter">${letter}.</span>${escapeHtml(text)}`;b.onclick=()=>choose(letter,b);$('options').appendChild(b)});
 $('nextBtn').textContent=state.index===state.questions.length-1?'See Results':'Next';
}
function explanationFor(q){
 const ans=q.options[q.answer];
 const p=q.prompt.toLowerCase();
 const a=ans.toLowerCase();
 const conceptNotes=[
  ['executive branch','The President is Commander in Chief, so commissioned military authority originates in the Executive Branch, while officers still remain bound by laws and court rulings.'],
  ['separation of powers','This principle divides authority among the branches and uses checks and balances to prevent any one branch from becoming dominant.'],
  ['enumerated powers','Enumerated powers are the specific powers the Constitution grants to the federal government; authority cannot simply be assumed beyond them.'],
  ['federalism','Federalism divides responsibilities between the federal government and state or local governments.'],
  ['first amendment','The First Amendment protects freedoms such as religion, speech, assembly, and petition, limiting official decisions based on protected beliefs or expression.'],

function choose(letter,button){if(state.locked)return;state.locked=true;const q=state.questions[state.index],ok=letter===q.answer;if(ok)state.correct++;
 state.answers.push({id:q.id,question:q,selected:letter,correct:ok});
 document.querySelectorAll('.option').forEach(b=>b.disabled=true);
 if(state.mode==='study'){
  document.querySelectorAll('.option').forEach(b=>{if(b.dataset.letter===q.answer)b.classList.add('correct');else if(b===button)b.classList.add('incorrect')});
  $('feedback').classList.remove('hidden');$('feedback').classList.add(ok?'good':'bad');
  $('feedback').innerHTML=`<div class="feedback-title">${ok?'Correct.':'Incorrect.'}</div><div class="feedback-explanation"><b>Correct answer: ${q.answer}. ${escapeHtml(q.options[q.answer])}</b><br>${explanationFor(q)}</div>`;
 }
 $('nextBtn').disabled=false;$('liveScore').textContent=state.mode==='study'?`${state.correct} correct`:'Answer recorded';
}
function next(){if(!state.locked)return;if(state.index<state.questions.length-1){state.index++;render()}else finish()}
function finish(){
 const missed=state.answers.filter(a=>!a.correct);saveMissed([...savedMissed(),...missed.map(a=>a.id)]);
 const total=state.answers.length, pct=total?Math.round(state.correct/total*100):0;
 $('quiz').classList.add('hidden');$('results').classList.remove('hidden');$('scoreText').innerHTML=`${pct}%<div class="small muted">${state.correct}/${total}</div>`;$('scoreRing').style.setProperty('--pct',pct+'%');
 $('correctStat').textContent=state.correct;$('wrongStat').textContent=total-state.correct;$('totalStat').textContent=total;$('percentStat').textContent=pct+'%';
 $('retryMissedBtn').disabled=missed.length===0;$('reviewWrap').classList.toggle('hidden',missed.length===0);
 $('reviewList').innerHTML=missed.map((a,i)=>`<div class="review-card"><span class="badge">${escapeHtml(a.question.section)}</span><p><strong>${i+1}. ${escapeHtml(a.question.prompt)}</strong></p><div class="small"><b>Your answer:</b> ${a.selected}. ${escapeHtml(a.question.options[a.selected])}<br><b>Correct answer:</b> ${a.question.answer}. ${escapeHtml(a.question.options[a.question.answer])}</div><div class="review-explanation"><b>Why:</b> ${explanationFor(a.question)}</div></div>`).join('');
 window.scrollTo({top:0,behavior:'smooth'});
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

$('newQuizBtn').onclick=()=>{$('results').classList.add('hidden');$('setup').classList.remove('hidden');window.scrollTo(0,0)};
