stic is most directly demonstrated?","options":{"A":"Waiting for detailed direction","B":"Independent critical preparation","C":"Avoiding responsibility","D":"Challenging authority for its own sake"},"answer":"B","explanation":"The Airman prepares a well-supported recommendation through independent analysis before advising leadership.","id":"a8q8","number":8,"section":"Followership"},{"prompt":"A follower’s sound judgment and communication increase a leader’s confidence. The leader then delegates greater discretion for routine issues.\n\nWhich principle is best illustrated?","options":{"A":"Initiative should decrease as trust grows","B":"Followers should act without informing leaders once trusted","C":"Effective followership develops trust that permits greater delegation","D":"Leadership becomes unnecessary when followers are competent"},"answer":"C","explanation":"Trust built through effective followership allows leaders to delegate more responsibility while retaining appropriate oversight.","id":"a8q9","number":9,"section":"Followership"},{"prompt":"A follower has completed research and developed two practical recommendations but has not yet briefed the commander or implemented either one.\n\nWhat should the follower do next?","options":{"A":"Implement the preferred option without informing the commander","B":"Continue researching until every possible question is answered","C":"Wait for the commander to independently identify the same solutions","D":"Present the recommendations to the commander for consideration"},"answer":"D","explanation":"The follower has completed appropriate preparation and should now present the researched recommendations to the decision authority.","id":"a8q10","number":10,"section":"Followership"}]},{"title":"Conflict Management","questions":[{"prompt":"Two sections repeatedly miss suspense dates because each interprets the same reporting language differently. Resources are adequate and relationships were previously positive.\n\nWhich source of conflict is most directly responsible?","options":{"A":"Communication factors","B":"Structural factors","C":"Personality factors","D":"Reward systems"},"answer":"A","explanation":"The conflict originates in different interpretations and the absence of a common understanding, which are communication factors.","id":"a9q1","number":1,"section":"Conflict Management"},{"prompt":"Four work centers compete for two forklifts, and every requirement is legitimate. Giving one section a forklift necessarily reduces what remains for the others.\n\nWhich negotiation approach best describes the situation?","options":{"A":"Integrative","B":"Distributive","C":"Cooperate","D":"Power With"},"answer":"B","explanation":"The resource is fixed and limited, creating a zero-sum allocation in which one party’s gain reduces another’s opportunity. That is distributive negotiation.","id":"a9q2","number":2,"section":"Conflict Management"},{"prompt":"Two leaders initially demand incompatible schedules. They then explain why each requirement matters, share manpower data, and develop a new schedule that supports both missions.\n\nWhich approach is most directly demonstrated?","options":{"A":"Distributive negotiation","B":"Insist","C":"Integrative negotiation","D":"Comply"},"answer":"C","explanation":"The parties move from positions to interests, exchange information, and create a mutually beneficial option, which is integrative negotiation.","id":"a9q3","number":3,"section":"Conflict Management"},{"prompt":"Two NCOs demand different weekend schedules. One needs elder-care time; the other must maintain certification before an inspection. Neither disclosed the concern initially.\n\nWhat should the mediator explore first?","options":{"A":"Which NCO has greater authority","B":"Which position was stated first","C":"Whether both will split the difference","D":"Each NCO’s underlying interests"},"answer":"D","explanation":"Understanding why each person wants a schedule reveals interests and can create options that are invisible when the discussion stays at the position level.","id":"a9q4","number":4,"section":"Conflict Management"},{"prompt":"A commander has authority to impose a reorganization but invites employees to shape the design and incorporates their recommendations.\n\nWhich use of power is most directly demonstrated?","options":{"A":"Power With","B":"Power Over","C":"Distributive power","D":"Evade"},"answer":"A","explanation":"The commander shares influence to improve the solution and strengthen trust, which is Power With.","id":"a9q5","number":5,"section":"Conflict Management"},{"prompt":"A mission must launch in thirty minutes. A crew chief refuses a required procedure and wants to debate an alternative. The commander directs immediate compliance and schedules discussion afterward.\n\nWhich AFNC approach best supports the decision?","options":{"A":"Cooperate","B":"Insist","C":"Settle","D":"Evade"},"answer":"B","explanation":"Insist is appropriate when the task is critical, time is limited, and immediate direction is required.","id":"a9q6","number":6,"section":"Conflict Management"},{"prompt":"Two project managers assume negative intent and stop sharing information. As confidence declines, both rely on untested assumptions and the negotiation stalls.\n\nWhich TIPO element has deteriorated most directly?","options":{"A":"Interests","B":"Power","C":"Trust","D":"Options"},"answer":"C","explanation":"Reduced confidence limits the willingness to exchange, believe, and use information, indicating deterioration of trust.","id":"a9q7","number":7,"section":"Conflict Management"},{"prompt":"Senior supervisors reject ideas from junior Airmen before evaluating them because they assume limited experience means limited value.\n\nWhich barrier is most directly illustrated?","options":{"A":"Active listening","B":"Self-monitoring","C":"Structural conflict","D":"Bias"},"answer":"D","explanation":"Preconceived beliefs are shaping the evaluation of information before the ideas are considered, which is bias.","id":"a9q8","number":8,"section":"Conflict Management"},{"prompt":"Two organizations remain respectful but argue only over who gets a classroom. A mediator asks why each needs the space and whether different times or locations could work.\n\nWhy is this likely to improve the negotiation?","options":{"A":"It shifts discussion from positions to interests and may reveal additional options","B":"It converts a limited resource into an unlimited one","C":"It determines which organization has greater formal power","D":"It guarantees both parties will receive their original request"},"answer":"A","explanation":"Moving from positions to interests can reveal needs that are satisfied through alternative schedules or resources, creating integrative options.","id":"a9q9","number":9,"section":"Conflict Management"},{"prompt":"Two parties each give up half of their original demand without exploring underlying needs or creating new options.\n\nWhich conclusion is most accurate?","options":{"A":"The outcome is automatically integrative because both parties compromised","B":"The outcome most closely reflects settling rather than integrative problem solving","C":"The outcome demonstrates Power With because losses were equal","D":"The outcome demonstrates Insist because a decision was reached"},"answer":"B","explanation":"Splitting the difference without exploring interests or generating options is settling. Compromise alone does not make a negotiation integrative.","id":"a9q10","number":10,"section":"Conflict Management"}]},{"title":"Inspiring Action","questions":[{"prompt":"A flight states, “We deliver personnel support that keeps Airmen and families ready.” It also states, “We will become the installation’s model for trusted, effortless service.”\n\nWhich statement is the vision?","options":{"A":"The first statement because it describes current purpose","B":"Both statements because mission and vision are interchangeable","C":"The second statement because it describes an aspirational future state","D":"Neither statement because a vision must include a numerical target"},"answer":"C","explanation":"The second statement describes the desired future. The first explains what the organization presently does and is therefore mission-oriented.","id":"a10q1","number":1,"section":"Inspiring Action"},{"prompt":"A commander writes a vision alone, publishes it once, and posts it throughout the building. Six months later, few members can explain it or connect it to decisions.\n\nWhich leadership action was most likely missing?","options":{"A":"Frequent revision of the vision’s wording","B":"Replacing the vision with additional policies","C":"Limiting the vision to senior leaders","D":"Continual communication, modeling, and integration into daily activity"},"answer":"D","explanation":"A vision gains influence through repeated communication, modeling, recognition, and use in priorities and decisions, not merely through publication.","id":"a10q2","number":2,"section":"Inspiring Action"},{"prompt":"A commander includes personnel from every work center in developing a vision and incorporates several recommendations. The final wording is not identical to any one member’s proposal.\n\nWhy is the process still valuable?","options":{"A":"Participation increases ownership and support even when every suggestion is not adopted","B":"A vision is valid only when every participant agrees with every word","C":"Participation removes the commander’s responsibility for the final vision","D":"Participation is useful only for identifying weaknesses"},"answer":"A","explanation":"Meaningful participation and feedback build understanding and buy-in even when the leader retains final responsibility and not every recommendation is used.","id":"a10q3","number":3,"section":"Inspiring Action"},{"prompt":"A planning team identifies strong customer expertise, outdated facilities, a new community partnership, and a potential funding reduction.\n\nWhich tool is the team using?","options":{"A":"Mission analysis","B":"SWOT analysis","C":"Performance appraisal","D":"Vision reinforcement"},"answer":"B","explanation":"The team is identifying strengths, weaknesses, opportunities, and threats, which is SWOT analysis.","id":"a10q4","number":4,"section":"Inspiring Action"},{"prompt":"A commander completes a SWOT analysis but has not yet established priorities or revised the vision.\n\nWhat should occur next?","options":{"A":"Rewrite the mission statement automatically","B":"Begin recognition programs before selecting a direction","C":"Identify organizational priorities from the completed analysis","D":"Repeat the SWOT until no weaknesses remain"},"answer":"C","explanation":"The SWOT should inform organizational priorities, which then support development or refinement of the vision.","id":"a10q5","number":5,"section":"Inspiring Action"},{"prompt":"A vision promises the organization will become the world’s best within thirty days despite no resources, plan, or feasible path.\n\nWhich characteristic is most lacking?","options":{"A":"Idealism","B":"Purpose","C":"Brevity","D":"Achievability"},"answer":"D","explanation":"An effective vision should be inspiring and idealistic while still credible and achievable enough to motivate action.","id":"a10q6","number":6,"section":"Inspiring Action"},{"prompt":"A lieutenant’s personal leadership vision focuses entirely on awards, promotions, and future assignments.\n\nWhich revision would best align with the lesson?","options":{"A":"Emphasize how the lieutenant will serve, develop, and provide direction to others","B":"Add more specific promotion milestones","C":"Remove all long-term aspirations","D":"Replace the vision with a list of daily tasks"},"answer":"A","explanation":"A personal leadership vision should provide purpose and direction centered on what the leader intends to contribute to others and the mission, not only personal advancement.","id":"a10q7","number":7,"section":"Inspiring Action"},{"prompt":"A commander consistently recognizes behavior aligned with the vision, references the vision during planning, and uses it to select priorities.\n\nWhich technique is most directly sustaining action?","options":{"A":"Continuous rewriting of the vision","B":"Frequent communication and modeling of the vision","C":"Delegating all responsibility for the vision to supervisors","D":"Measuring only production output"},"answer":"B","explanation":"Repeated communication, modeling, and reinforcement integrate the vision into organizational life and sustain momentum.","id":"a10q8","number":8,"section":"Inspiring Action"},{"prompt":"A team identifies an external opportunity but never checks whether the opportunity is real or merely assumed by internal staff.\n\nWhich improvement best follows the lesson?","options":{"A":"Remove external factors from the SWOT","B":"Treat every perceived opportunity as fact","C":"Include perspectives from inside and outside the organization to test assumptions","D":"Delay planning until the opportunity becomes a formal requirement"},"answer":"C","explanation":"Involving internal and external perspectives helps distinguish factual opportunities and threats from assumptions.","id":"a10q9","number":9,"section":"Inspiring Action"},{"prompt":"A commander says, “The mission tells us what we do. The vision tells us where we are going and why the future matters.”\n\nWhich conclusion is most accurate?","options":{"A":"Mission and vision serve identical purposes","B":"Vision describes current operations; mission describes the future","C":"Vision replaces the mission after priorities are set","D":"Mission describes current action; vision provides aspiration and direction"},"answer":"D","explanation":"Mission identifies present purpose and work, while vision describes the desired future and provides aspiration and direction.","id":"a10q10","number":10,"section":"Inspiring Action"}]},{"title":"Change Management","questions":[{"prompt":"A commander presents data showing the current process no longer meets mission needs, explains the benefits of change, and answers concerns. No new procedures have begun.\n\nWhich Lewin stage is most directly represented?","options":{"A":"Unfreezing","B":"Changing","C":"Refreezing","D":"Coercion"},"answer":"A","explanation":"The organization is being prepared to leave the current state by understanding why change is necessary, which is unfreezing.","id":"a11q1","number":1,"section":"Change Management"},{"prompt":"A squadron begins using a new digital system. Leaders provide daily support, adjust training, gather feedback, and manage a temporary performance decline.\n\nWhich Lewin stage is most directly represented?","options":{"A":"Unfreezing","B":"Changing","C":"Refreezing","D":"Over-determination"},"answer":"B","explanation":"The new technology and behaviors are actively being implemented and supported, which is the changing stage.","id":"a11q2","number":2,"section":"Change Management"},{"prompt":"Months after implementation, supervisors monitor compliance, recognize correct use, provide refresher training, and discourage a return to the old process.\n\nWhich Lewin stage is most directly represented?","options":{"A":"Changing","B":"Unfreezing","C":"Refreezing","D":"Participation and involvement"},"answer":"C","explanation":"Reinforcement, monitoring, and stabilization of the new process are refreezing activities.","id":"a11q3","number":3,"section":"Change Management"},{"prompt":"Employees worry that a reorganization may eliminate their jobs or leave them without the skills needed in new roles.\n\nWhich source of resistance is most direct?","options":{"A":"Distrust","B":"Over-determination","C":"Different perception or no felt need","D":"Uncertainty"},"answer":"D","explanation":"The employees are unsure what will happen to their positions and whether they can succeed, which is uncertainty.","id":"a11q4","number":4,"section":"Change Management"},{"prompt":"A commander announces a change but cannot explain why it is necessary or how the decision was reached. Employees doubt leadership’s competence and motives.\n\nWhich source of resistance is most direct?","options":{"A":"Distrust","B":"Self-interest","C":"Over-determination","D":"Uncertainty"},"answer":"A","explanation":"The core issue is reduced confidence in leadership’s reasoning, competence, and motives, which is distrust.","id":"a11q5","number":5,"section":"Change Management"},{"prompt":"A work center agrees that a simpler process would be better, but decades of embedded rules, approvals, and systems make the change difficult.\n\nWhich source of resistance is most direct?","options":{"A":"Self-interest","B":"Over-determination","C":"Distrust","D":"Uncertainty"},"answer":"B","explanation":"Existing structures and rules are constraining change even when people recognize the need, which is over-determination.","id":"a11q6","number":6,"section":"Change Management"},{"prompt":"Before implementation, a commander includes representatives from every affected section in designing the new process and asks them to identify obstacles.\n\nWhich resistance-reduction method is most direct?","options":{"A":"Education and communication","B":"Facilitation and support","C":"Participation and involvement","D":"Coercion"},"answer":"C","explanation":"The affected personnel are given a meaningful role in planning and implementation, which is participation and involvement.","id":"a11q7","number":7,"section":"Change Management"},{"prompt":"Employees support a new system but struggle with unfamiliar software. Leaders add training, resources, coaching, and gradual practice.\n\nWhich method is most direct?","options":{"A":"Negotiation and agreement","B":"Participation and involvement","C":"Coercion","D":"Facilitation and support"},"answer":"D","explanation":"Training, resources, encouragement, and assistance during transition are facilitation and support.","id":"a11q8","number":8,"section":"Change Management"},{"prompt":"After extensive explanation, participation, and training, several employees still refuse to follow a lawful new procedure. Leaders warn that continued refusal may result in discipline.\n\nWhich method is most direct?","options":{"A":"Coercion","B":"Education and communication","C":"Facilitation and support","D":"Negotiation and agreement"},"answer":"A","explanation":"Mandatory compliance backed by consequences is coercion, generally used when other methods have failed or immediate compliance is required.","id":"a11q9","number":9,"section":"Change Management"},{"prompt":"During implementation, productivity falls because the new system repeatedly fails. Rather than forcing continued use, the commander pauses, gathers feedback, and reexplains the need and plan before resuming.\n\nWhich principle is best reflected?","options":{"A":"Leaders should immediately refreeze any partially implemented process","B":"Leaders should revisit unfreezing techniques when implementation creates new resistance or confusion","C":"Leaders should use coercion whenever productivity decreases","D":"Leaders should abandon every change that produces temporary difficulty"},"answer":"B","explanation":"When implementation reveals misunderstanding or new resistance, leaders may need to revisit unfreezing through communication, feedback, and support rather than forcing a failing transition.","id":"a11q10","number":10,"section":"Change Management"}]},{"title":"Establishing Expectations","questions":[{"prompt":"Different sections create their own definitions of success because no common expectations were established. Deadlines are missed even though personnel are motivated.\n\nWhy are expectations important in this situation?","options":{"A":"They eliminate the need for supervision once published","B":"They permit accountability before requirements are explained","C":"They identify objectives, provide a roadmap, and connect performance to standards and mission","D":"They prevent leaders from adjusting methods after implementation"},"answer":"C","explanation":"Expectations align objectives, standards, and individual performance with the mission. They do not eliminate feedback or adaptation.","id":"a12q1","number":1,"section":"Establishing Expectations"},{"prompt":"A commander distributes identical written guidance, but each work center interprets it differently.\n\nWhich guideline was most likely overlooked?","options":{"A":"Seek buy-in","B":"Track activities within each task","C":"Know when expectations are needed","D":"Ensure expectations are clearly communicated and understood"},"answer":"D","explanation":"Identical delivery does not guarantee understanding. Leaders must communicate clearly and confirm that subordinates interpret the expectations as intended.","id":"a12q2","number":2,"section":"Establishing Expectations"},{"prompt":"Before setting squadron expectations, a major reviews wing priorities, clarifies command intent, and studies existing standards.\n\nWhich guideline is most directly demonstrated?","options":{"A":"Understand the importance and higher-level context before communicating personal expectations","B":"Seek buy-in after publishing final guidance","C":"Track milestones before identifying objectives","D":"Allow each section to define mission requirements"},"answer":"A","explanation":"The leader first understands higher-level expectations and mission context so personal expectations align with command intent.","id":"a12q3","number":3,"section":"Establishing Expectations"},{"prompt":"Airmen can repeat every task requirement but cannot explain how their work supports the organization or Air Force mission.\n\nWhich leadership action is most needed?","options":{"A":"Add more detailed checklists","B":"Help subordinates connect expectations to organizational objectives and mission accomplishment","C":"Reduce discussion of mission to avoid distracting from tasks","D":"Wait until performance declines before explaining purpose"},"answer":"B","explanation":"Expectations gain meaning and commitment when people understand how their work contributes to organizational objectives and the larger mission.","id":"a12q4","number":4,"section":"Establishing Expectations"},{"prompt":"A commander asks supervisors to identify obstacles, adopts several suggestions, ensures goals are achievable, and expresses confidence in the team.\n\nWhich guideline is most directly demonstrated?","options":{"A":"Track activities","B":"Know when expectations are needed","C":"Seek buy-in","D":"Simplify communication"},"answer":"C","explanation":"Participation, feedback, achievable goals, and expressed confidence build buy-in and commitment.","id":"a12q5","number":5,"section":"Establishing Expectations"},{"prompt":"After publishing expectations, a commander compares results with milestones, identifies recurring gaps, adjusts the process, and continues monitoring.\n\nWhich guideline is most directly demonstrated?","options":{"A":"Expectations should remain fixed after publication","B":"Buy-in replaces performance measurement","C":"Expectations are needed only during initial counseling","D":"Plan to track activities, progress, milestones, and results"},"answer":"D","explanation":"Tracking activities includes monitoring milestones and results, identifying gaps, and refining expectations or processes as needed.","id":"a12q6","number":6,"section":"Establishing Expectations"},{"prompt":"A leader establishes expectations, observes recurring performance gaps, clarifies and adjusts the expectations, then continues observing.\n\nWhich statement best describes this sequence?","options":{"A":"Expectation setting is iterative rather than a one-time event","B":"Expectations should be withdrawn whenever a gap appears","C":"Observation should occur only after discipline is imposed","D":"Adjustment proves the original expectations were unnecessary"},"answer":"A","explanation":"Leaders establish, observe, clarify or adjust, and continue monitoring. Effective expectation setting is an ongoing process.","id":"a12q7","number":7,"section":"Establishing Expectations"},{"prompt":"A supervisor explains expectations using technical language that new Airmen do not understand. Everyone nods, but performance varies widely.\n\nWhat should the supervisor do next?","options":{"A":"Increase inspections without revisiting the message","B":"Restate the expectations in clear, simple language and confirm understanding","C":"Allow each Airman to choose an individual standard","D":"Wait for the next formal feedback cycle"},"answer":"B","explanation":"The leader should simplify the message, include necessary detail without obscuring it, and verify understanding.","id":"a12q8","number":8,"section":"Establishing Expectations"},{"prompt":"A commander has communicated expectations and gained buy-in. Supervisors understand the requirements but do not see how they support installation priorities.\n\nWhat should occur next?","options":{"A":"Begin discipline because the expectations were already published","B":"Rewrite all expectations from the beginning","C":"Help supervisors connect the expectations to organizational objectives and mission","D":"Stop discussing expectations and begin tracking only"},"answer":"C","explanation":"Before relying solely on measurement, the leader should establish the connection between expectations, organizational objectives, and mission accomplishment.","id":"a12q9","number":9,"section":"Establishing Expectations"},{"prompt":"Six months after implementation, sections gradually interpret expectations differently even though initial communication and buy-in were strong.\n\nWhich action best supports long-term success?","options":{"A":"Allow each section to formalize its local interpretation","B":"Eliminate written expectations and rely on verbal correction","C":"Restart the entire process without reviewing performance data","D":"Continue tracking performance and compare results against the established expectations"},"answer":"D","explanation":"Ongoing tracking reveals drift and supports timely clarification or adjustment while preserving alignment with the original objectives.","id":"a12q10","number":10,"section":"Establishing Expectations"}]},{"title":"Organizational Climate","questions":[{"prompt":"A squadron has twenty-year traditions that shape how members mentor and recognize one another. After a recent manpower cut, current morale and trust decline quickly.\n\nWhich conclusion best distinguishes the two observations?","options":{"A":"The traditions are culture, while current morale and trust reflect climate","B":"The traditions are climate, while current morale is culture","C":"Both are climate because they affect personnel","D":"Both are culture because they occur within the same organization"},"answer":"A","explanation":"Culture consists of deeper, long-term values, norms, customs, and traditions. Climate reflects current attitudes, perceptions, and feelings and can change more quickly.","id":"a13q1","number":1,"section":"Organizational Climate"},{"prompt":"A commander treats one unfavorable climate survey as proof that every long-standing tradition must be replaced immediately.\n\nWhich response is most consistent with the lesson?","options":{"A":"The commander is correct because climate and culture always change together","B":"The survey is one indicator of current climate; culture may influence it, but climate is more adaptable and should be assessed broadly","C":"The survey measures culture directly and permanently","D":"The survey should be ignored because only informal conversations reveal climate"},"answer":"B","explanation":"A survey is one snapshot of climate. Leaders should compare it with observation and other inputs. Culture may influence climate, but the two are not interchangeable.","id":"a13q2","number":2,"section":"Organizational Climate"},{"prompt":"Airmen avoid proposing ideas because failed experiments are publicly criticized while thoughtful innovation is rarely recognized.\n\nWhich strategy would most directly improve the climate?","options":{"A":"Reduce standards so failure has no consequence","B":"Increase inspections and technical training only","C":"Strengthen emotional safety while preserving accountability for calculated risk","D":"Replace all supervisors before discussing the issue"},"answer":"C","explanation":"The problem is fear of humiliation or harsh response. Emotional safety allows respectful challenge and calculated risk while maintaining appropriate standards.","id":"a13q3","number":3,"section":"Organizational Climate"},{"prompt":"Morale is high, but supervisors avoid difficult assignments to keep everyone comfortable. Development and performance have stalled.\n\nWhich strategy best strengthens climate?","options":{"A":"Lower expectations to protect morale","B":"Eliminate performance goals until members request them","C":"Focus only on recognition and avoid challenge","D":"Maintain high standards and provide meaningful opportunities for growth with clear expectations"},"answer":"D","explanation":"A positive climate includes high standards, clear expectations, and opportunities for professional growth, not comfort without development.","id":"a13q4","number":4,"section":"Organizational Climate"},{"prompt":"A commander has reviewed DEOCS results, compared them with observations, and identified recurring concerns. No unit-wide discussion has occurred.\n\nWhat should the commander do next?","options":{"A":"Address the unit transparently about strengths, concerns, mission effects, and improvement strategies","B":"Implement corrective policies without discussing the findings","C":"Wait for the next annual survey","D":"Discuss only the lowest-scoring category"},"answer":"A","explanation":"After understanding the climate, the leader should address the unit through a straightforward out-brief of positive and negative findings, mission effects, and proposed actions.","id":"a13q5","number":5,"section":"Organizational Climate"},{"prompt":"After discussing survey results, a commander repeatedly communicates mission and priorities, empowers subordinate problem solving, and recognizes positive contributions.\n\nWhich phase is most directly represented?","options":{"A":"Understanding the climate","B":"Inspiring action","C":"Changing culture","D":"Conducting the survey"},"answer":"B","explanation":"Communicating priorities, enabling action, and reinforcing positive contributions are central to inspiring action.","id":"a13q6","number":6,"section":"Organizational Climate"},{"prompt":"One supervisor casually jokes about mistakes, ignores small accomplishments, and praises only production numbers. Morale declines even though no written policy changed.\n\nWhich principle best explains the effect?","options":{"A":"Climate is shaped only by formal policy","B":"Climate changes only after a DEOCS","C":"Everyday leadership behavior—what leaders highlight, reward, reprimand, and casually comment on—shapes climate","D":"Culture prevents leaders from affecting current perceptions"},"answer":"C","explanation":"Small, repeated leadership signals influence how people perceive safety, value, fairness, and priorities, thereby shaping climate.","id":"a13q7","number":7,"section":"Organizational Climate"},{"prompt":"A commander wants to improve climate primarily by buying new equipment. Another leader emphasizes physical safety, emotional security, high standards, clear expectations, and growth.\n\nWhich view is most consistent with the lesson?","options":{"A":"Equipment alone will automatically create a positive climate","B":"Climate depends only on historical culture","C":"High standards should be reduced until morale rises","D":"Leadership behavior and a safe, challenging, clearly directed environment are central to positive climate"},"answer":"D","explanation":"Facilities matter, but positive climate is built through physical and emotional safety, clear expectations, high standards, and opportunities to grow.","id":"a13q8","number":8,"section":"Organizational Climate"},{"prompt":"A commander stops recognizing positive contributions once initial climate scores improve.\n\nWhich concern is most supported by the lesson?","options":{"A":"Removing reinforcement may allow positive behaviors and perceptions to fade","B":"Recognition should stop so personnel do not become dependent on praise","C":"Recognition affects culture but not climate","D":"Only policy changes can sustain climate improvement"},"answer":"A","explanation":"Continued reinforcement helps sustain the behaviors and perceptions supporting a positive climate.","id":"a13q9","number":9,"section":"Organizational Climate"},{"prompt":"Which sequence best reflects the lesson’s approach to improving organizational climate?","options":{"A":"Rewrite culture, reduce standards, conduct a survey, and wait","B":"Understand the climate, address the unit, inspire action, and focus on everyday leadership behaviors","C":"Purchase resources, publish policy, discipline dissent, and reassess","D":"Address the unit first, then determine what the climate is"},"answer":"B","explanation":"The lesson’s sequence is to understand the climate, transparently address the unit, inspire action, and focus on the many everyday behaviors that sustain perceptions.","id":"a13q10","number":10,"section":"Organizational Climate"}]},{"title":"National Security","questions":[{"prompt":"The United States negotiates allied access, coordinates international support, and seeks a formal agreement before deploying forces.\n\nWhich instrument of national power is most directly emphasized?","options":{"A":"Informational","B":"Military","C":"Diplomatic","D":"Economic"},"answer":"C","explanation":"Negotiation, alliance coordination, access agreements, and gaining foreign support are diplomatic activities. A possible later deployment does not change the primary action described.","id":"a14q1","number":1,"section":"National Security"},{"prompt":"The United States freezes financial assets, restricts exports, and limits trade to influence another state without using force.\n\nWhich instrument is most direct?","options":{"A":"Informational","B":"Diplomatic","C":"Military","D":"Economic"},"answer":"D","explanation":"Asset freezes, export controls, and trade restrictions are economic instruments used to influence behavior.","id":"a14q2","number":2,"section":"National Security"},{"prompt":"An embassy expands exchanges, public diplomacy, and international messaging to improve foreign understanding of U.S. policy.\n\nWhich instrument is most direct?","options":{"A":"Informational","B":"Diplomatic","C":"Military","D":"Economic"},"answer":"A","explanation":"The specific activities communicate and shape understanding among foreign audiences, making informational power the most direct instrument.","id":"a14q3","number":3,"section":"National Security"},{"prompt":"The United States deploys aircraft, increases patrols, and conducts a visible exercise to deter aggression against an ally.\n\nWhich instrument is most direct?","options":{"A":"Economic","B":"Military","C":"Diplomatic","D":"Informational"},"answer":"B","explanation":"The visible use and positioning of military forces for deterrence is the military instrument, even though it also sends a message.","id":"a14q4","number":4,"section":"National Security"},{"prompt":"A response combines sanctions, negotiations, public messaging, and a limited force deployment under one national objective.\n\nWhich principle best explains the design?","options":{"A":"Each instrument should operate separately to avoid overlap","B":"The military instrument should direct the others","C":"The instruments should be integrated and orchestrated toward the same objective","D":"Diplomacy should stop when military forces deploy"},"answer":"C","explanation":"The instruments of national power are interrelated and are most effective when coordinated toward common national objectives.","id":"a14q5","number":5,"section":"National Security"},{"prompt":"A seminar assigns ultimate national security responsibility to the Secretary of Defense because military operations are the most visible instrument.\n\nWhich correction is most accurate?","options":{"A":"The Chairman of the Joint Chiefs of Staff has ultimate responsibility because the Chairman prepares military advice","B":"Congress alone executes national security policy","C":"The Secretary of State has ultimate responsibility whenever diplomacy is used","D":"The President has ultimate responsibility for national security policy and directs the coordinated use of national power"},"answer":"D","explanation":"The President has ultimate responsibility for making and executing national security policy and coordinating the instruments of national power.","id":"a14q6","number":6,"section":"National Security"},{"prompt":"A planner needs the President’s overarching explanation of how diplomatic, informational, military, and economic power will advance national interests.\n\nWhich document should be reviewed?","options":{"A":"National Security Strategy","B":"National Military Strategy","C":"National Defense Strategy","D":"Service strategy"},"answer":"A","explanation":"The National Security Strategy expresses the President’s overarching use of national power to advance national interests and objectives.","id":"a14q7","number":7,"section":"National Security"},{"prompt":"Which sequence best represents the flow of strategic direction?","options":{"A":"National Military Strategy → National Defense Strategy → National Security Strategy → national objectives","B":"National objectives → National Security Strategy → National Defense Strategy → National Military Strategy → Service strategy","C":"Service strategy → National Military Strategy → National Security Strategy → national objectives","D":"National Defense Strategy → national objectives → Service strategy → National Security Strategy"},"answer":"B","explanation":"The hierarchy moves from desired national ends and presidential direction to defense, military, and Service-level implementation.","id":"a14q8","number":8,"section":"National Security"},{"prompt":"A strategy states the objective “deter aggression” and proposes coalition building and forward presence using assigned forces and funding.\n\nWhich pairing is correct?","options":{"A":"Deter aggression is a way; coalition building is an end; forces are interests","B":"Deter aggression is a means; forward presence is an interest; funding is an end","C":"Deter aggression is an end; coalition building and forward presence are ways; forces and funding are means","D":"All three are ways because each contributes to strategy"},"answer":"C","explanation":"The desired outcome is the end, the strategic approaches are the ways, and the resources and capabilities are the means.","id":"a14q9","number":9,"section":"National Security"},{"prompt":"National strategy identifies a resilient Joint Force as a priority. A Service changes policy, and a squadron changes training.\n\nWhich conclusion is best supported?","options":{"A":"National strategy affects only civilian leaders","B":"Units independently establish national objectives","C":"Service policy is separate from national strategy","D":"Strategic direction is translated through defense and Service guidance into unit-level activity"},"answer":"D","explanation":"National direction flows through the strategic hierarchy and ultimately influences Service policy and daily military activity.","id":"a14q10","number":10,"section":"National Security"}]},{"title":"What Is War","questions":[{"prompt":"A state uses violence to force another state to accept a political demand rather than merely to destroy military equipment.\n\nWhich definition is most directly illustrated?","options":{"A":"War is an act of violence intended to compel an opponent to do one’s will","B":"War is a competition for economic advantage","C":"War is the temporary absence of diplomacy","D":"War is military action independent of policy"},"answer":"A","explanation":"Clausewitz’s definition centers on violence used to compel an opponent’s will in support of a purpose.","id":"a15q1","number":1,"section":"What Is War"},{"prompt":"A commander describes the political purpose behind a conflict and the physical force used to impose that purpose.\n\nWhich two themes are being described?","options":{"A":"Fog and friction","B":"Policy and violence","C":"Chance and will","D":"Nature and character"},"answer":"B","explanation":"The lesson identifies policy and violence as the two inseparable themes of war.","id":"a15q2","number":2,"section":"What Is War"},{"prompt":"Autonomous systems and cyber operations change how a war is fought, but violence, political purpose, uncertainty, and human judgment remain.\n\nWhich conclusion is most accurate?","options":{"A":"War’s nature changed while its character remained constant","B":"Both nature and character became irrelevant","C":"War’s character changed while its fundamental nature remained constant","D":"Technology eliminated the human nature of war"},"answer":"C","explanation":"Technology and conditions change the character of war, while its enduring nature remains tied to policy, violence, uncertainty, and human behavior.","id":"a15q3","number":3,"section":"What Is War"},{"prompt":"Which set contains the three enduring truths?","options":{"A":"War is always total; controlled by technology; and decided by superior weapons","B":"War is predictable; separate from politics; and primarily economic","C":"War is territorial; conventional; and tactically determined","D":"War is an instrument of policy; a complex and chaotic human endeavor; and a clash of opposing wills"},"answer":"D","explanation":"These are the three enduring truths identified in the lesson.","id":"a15q4","number":4,"section":"What Is War"},{"prompt":"National leaders end military action after achieving a limited political objective, even though commanders could continue destroying enemy forces.\n\nWhich enduring truth most directly explains the decision?","options":{"A":"War is an instrument of policy","B":"War is a clash of opposing wills","C":"War is a complex human endeavor","D":"War is dominated by chance"},"answer":"A","explanation":"Military action remains subordinate to political purpose. Once the policy objective is achieved, further destruction is not automatically justified.","id":"a15q5","number":5,"section":"What Is War"},{"prompt":"A campaign plan is tactically successful but expands beyond the objective authorized by political leaders.\n\nWhich response best reflects the lesson?","options":{"A":"Military success should redefine political objectives","B":"The campaign should remain limited unless political objectives are revised","C":"The campaign should expand whenever forces are available","D":"Political leaders should stop influencing operations after combat begins"},"answer":"B","explanation":"Political objectives guide the scope, intensity, and conduct of military action. Tactical opportunity does not independently replace policy.","id":"a15q6","number":6,"section":"What Is War"},{"prompt":"Commanders receive incomplete, contradictory, and excessive information about the battlefield.\n\nWhich factor is most direct?","options":{"A":"Friction","B":"Chance","C":"Fog","D":"Policy"},"answer":"C","explanation":"Fog is the difficulty of understanding what is happening because information is incomplete, false, excessive, or conflicting.","id":"a15q7","number":7,"section":"What Is War"},{"prompt":"A simple operation becomes difficult because roads fail, equipment breaks, resupply is late, and many small problems accumulate.\n\nWhich factor is most direct?","options":{"A":"Chance","B":"Fog","C":"Violence","D":"Friction"},"answer":"D","explanation":"Friction is the accumulation of practical difficulties that makes simple plans difficult in execution.","id":"a15q8","number":8,"section":"What Is War"},{"prompt":"A strike fails because an improbable object unexpectedly deflects the blast despite otherwise sound planning.\n\nWhich factor is most direct?","options":{"A":"Chance","B":"Fog","C":"Friction","D":"Opposing will"},"answer":"A","explanation":"A single unpredictable event altering the outcome most directly illustrates chance.","id":"a15q9","number":9,"section":"What Is War"},{"prompt":"A conflict combines large conventional battles, guerrilla attacks, information campaigns, and competition for population legitimacy.\n\nWhich conclusion is best supported?","options":{"A":"The conflict must be classified exclusively by the method used first","B":"Traditional and irregular warfare may coexist and shift over time","C":"Irregular warfare begins only after conventional forces withdraw","D":"Traditional warfare cannot include political influence"},"answer":"B","explanation":"Actual warfare can combine traditional and irregular methods and can evolve rapidly between forms.","id":"a15q10","number":10,"section":"What Is War"}]},{"title":"What the DAF Brings to the Fight","questions":[{"prompt":"A joint force uses aircraft to bypass terrain, project power across distance, influence operational tempo, and create tactical through strategic effects.\n\nWhich concept is most direct?","options":{"A":"Air superiority","B":"Global precision attack","C":"Airpower","D":"Rapid global mobility"},"answer":"C","explanation":"The scenario describes the broad ability to project military power in, from, and through the air, which is airpower.","id":"a16q1","number":1,"section":"What the DAF Brings to the Fight"},{"prompt":"A force protects space capabilities, assures access, operates within the domain, and delivers effects from space in support of military objectives.\n\nWhich concept is most direct?","options":{"A":"Space control","B":"Space access","C":"Global mission operations","D":"Military spacepower"},"answer":"D","explanation":"Military spacepower is the broad ability to accomplish military objectives in, from, and to the space domain. The other choices are component functions.","id":"a16q2","number":2,"section":"What the DAF Brings to the Fight"},{"prompt":"Which list contains only USAF core functions?","options":{"A":"Air superiority; global precision attack; rapid global mobility; global ISR; command and control","B":"Air superiority; space control; rapid global mobility; protection; global ISR","C":"Fires; sustainment; movement and maneuver; global precision attack; command and control","D":"Air superiority; global mission operations; space access; global ISR; command and control"},"answer":"A","explanation":"The five USAF core functions are air superiority, global precision attack, rapid global mobility, global ISR, and command and control.","id":"a16q3","number":3,"section":"What the DAF Brings to the Fight"},{"prompt":"A commander needs freedom to operate at a particular time and place without prohibitive interference from enemy air and missile threats, but the enemy may retain some ability to interfere.\n\nWhich condition is required?","options":{"A":"Air parity","B":"Air superiority","C":"Air supremacy","D":"Defensive counterair"},"answer":"B","explanation":"Air superiority permits operations without prohibitive interference. Air supremacy is the higher condition in which the enemy cannot effectively interfere.","id":"a16q4","number":4,"section":"What the DAF Brings to the Fight"},{"prompt":"Neither side controls the air, and both can interfere with the other’s operations.\n\nWhich condition exists?","options":{"A":"Air superiority","B":"Air supremacy","C":"Air parity","D":"Air dominance"},"answer":"C","explanation":"Air parity exists when neither force has control of the air.","id":"a16q5","number":5,"section":"What the DAF Brings to the Fight"},{"prompt":"An opposing force is incapable of effective interference by air or missile threats within the operational area.\n\nWhich condition exists?","options":{"A":"Air parity",  $('correctStat').textContent=state.correct;$('wrongStat').textContent=total-state.correct;$('totalStat').textContent=total;$('percentStat').textContent=pct+'%';
 $('retryMissedBtn').disabled=missed.length===0;$('reviewWrap').classList.toggle('hidden',total===0);
 $('reviewList').innerHTML=state.answers.map((a,i)=>`<div class="review-card ${a.correct?'correct-review':''}"><span class="badge">${escapeHtml(a.question.section)}</span><p><strong>${i+1}. ${escapeHtml(a.question.prompt)}</strong></p><div class="small"><b>Result:</b> ${a.correct?'Correct':'Incorrect'}<br><b>Your answer:</b> ${a.selected}. ${escapeHtml(a.question.options[a.selected])}<br><b>Correct answer:</b> ${a.question.answer}. ${escapeHtml(a.question.options[a.question.answer])}</div><div class="review-explanation"><b>Why your selection is ${a.correct?'right':'not the best answer'}:</b> ${escapeHtml(selectedExplanation(a.question,a.selected))}<br><br><b>Why the correct answer is best:</b> ${escapeHtml(explanationFor(a.question))}</div></div>`).join('');
 window.scrollTo({top:0,behavior:'smooth'});
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
$('startBtn').onclick=()=>begin();$('nextBtn').onclick=next;$('quitBtn').onclick=()=>{if(state.answers.length)finish();else{$('quiz').classList.add('hidden');$('setup').classList.remove('hidden')}};
$('newQuizBtn').onclick=()=>{$('results').classList.add('hidden');$('setup').classList.remove('hidden');renderLessons();window.scrollTo(0,0)};
$('retryMissedBtn').onclick=()=>{const bank=state.bank;begin(state.answers.filter(a=>!a.correct).map(a=>a.question),bank)};
$('missedBtn').onclick=()=>{const ids=new Set(savedMissed());const bank=$('bank').value;begin(activeFlat().filter(q=>ids.has(q.id)),bank)};
$('clearMissedBtn').onclick=()=>{const activeIds=new Set(activeFlat().map(q=>q.id));saveMissed(savedMissed().filter(id=>!activeIds.has(id)));$('setupMsg').textContent='Saved missed questions cleared for this bank.'};
$('bank').onchange=renderLessons;$('allBtn').onclick=()=>document.querySelectorAll('#lessonList input').forEach(x=>x.checked=true);$('noneBtn').onclick=()=>document.querySelectorAll('#lessonList input').forEach(x=>x.checked=false);$('printBtn').onclick=()=>window.print();
init();
</script>
</body></html>
